<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karla Sherlyn · Curriculum Vitae</title>

<!-- ✅ FAVICON -->
<link rel="icon" href="./favicon.png?v=5">

<link rel="stylesheet" href="styles.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    overflow-x:hidden;
}

/* CONTENEDOR */
.fullscreen-container{
    position:relative;
    min-height:100vh;
}

/* FONDO */
.fullscreen-img{
    width:100%;
    display:block;
    pointer-events:none;
}

/* CAPA */
.scrapbook-layer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

/* ELEMENTOS */
.scrap-item{
    position:absolute;
    cursor:grab;
}

.scrap-item:active{
    cursor:grabbing;
}

.scrap-item img{
    width:100%;
    display:block;
}

/* WATERMARK */
.watermark{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:12px;
    background:rgba(0,0,0,0.5);
    padding:4px 12px;
    border-radius:20px;
    pointer-events:none;
}

/* ROTACIÓN */
.rotate-animation{
    animation: girar 40s linear infinite;
}

@keyframes girar{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="fullscreen-container">
    <img src="img/fondo.png" class="fullscreen-img">

    <div class="scrapbook-layer">

        <div class="watermark">
            © 2026 Karla Cruz | YANG´S LAB
        </div>

        <!-- ARÁNDANO -->
        <div class="scrap-item rotate-animation" style="top:50%; left:12%; width:22%;">
            <img src="img/Arandanos.png">
        </div>

        <!-- BOTÓN CV -->
        <div class="scrap-item" style="top:75%; left:7%; width:18%;">
            <img src="img/Boton_curriculum.png">
        </div>

        <!-- BOTÓN CONTACTO -->
        <div class="scrap-item" style="top:75%; left:31%; width:18%;">
            <img src="img/Boton_contactame.png">
        </div>

        <!-- BOTÓN PORTAFOLIO -->
        <div class="scrap-item" style="top:45%; left:41%; width:22%;">
            <img src="img/Boton_portafolio.png">
        </div>

    </div>
</div>

<script>
// ===== FUNCIONES =====
function descargarCV(){
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function irContacto(){
    window.location.href = "contactame.html";
}

function irPortafolio(){
    window.location.href = "pages/portafolio.html"; // 👈 IMPORTANTE para GitHub
}

// ===== DRAG =====
let selected = null;
let offsetX = 0;
let offsetY = 0;

document.querySelectorAll(".scrap-item").forEach(el => {

    const img = el.querySelector("img");

    // CLICK DOBLE = ACCIÓN
    el.addEventListener("dblclick", () => {
        const src = img.src.toLowerCase();

        if(src.includes("curriculum")) descargarCV();
        if(src.includes("contactame")) irContacto();
        if(src.includes("portafolio")) irPortafolio();
    });

    // DRAG
    el.addEventListener("mousedown", (e)=>{
        selected = el;
        offsetX = e.clientX - el.offsetLeft;
        offsetY = e.clientY - el.offsetTop;

        document.onmousemove = (e)=>{
            if(!selected) return;
            selected.style.left = (e.clientX - offsetX) + "px";
            selected.style.top = (e.clientY - offsetY) + "px";
        };

        document.onmouseup = ()=>{
            selected = null;
            document.onmousemove = null;
        };
    });

});
</script>

</body>
</html>
