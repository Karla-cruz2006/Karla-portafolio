<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karla Sherlyn · Curriculum Vitae</title>

<!-- ✅ ANTI-CACHÉ para que siempre veas los cambios -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    overflow-x: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

/* CONTENEDOR PRINCIPAL */
.fullscreen-container {
    position: relative;
    min-height: 100vh;
    width: 100%;
}

/* FONDO */
.fullscreen-img {
    width: 100%;
    display: block;
    pointer-events: none;
}

/* CAPA DE ELEMENTOS */
.scrapbook-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* ============================================
   ELEMENTOS - BLOQUEADOS (SIN MOVIMIENTO)
   ============================================ */
.scrap-item {
    position: absolute;
    cursor: pointer;      /* Manita para indicar que es clickeable */
    user-select: none;
    transform-origin: center center;
}

/* IMAGEN DENTRO DEL ELEMENTO */
.scrap-item img {
    width: 100%;
    display: block;
    pointer-events: none;
    border-radius: 0;
}

/* ============================================
   ANIMACIÓN EXCLUSIVA PARA ARÁNDANOS
   ============================================ */
.rotate-animation {
    animation: blueberryRotate 40s linear infinite;
    transform-origin: center center;
}

@keyframes blueberryRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ============================================
   EFECTOS VISUALES (SIN ALTERAR POSICIÓN)
   ============================================ */

/* Efecto hover suave - solo sombra, sin movimiento */
.scrap-item:hover {
    filter: drop-shadow(0 0 10px rgba(255, 235, 140, 0.5));
    transition: filter 0.25s ease;
}

/* ============================================
   TOOLTIPS INFORMATIVOS - SIN INDICACIONES DE EDICIÓN
   ============================================ */

/* Tooltip base para todos los elementos */
.scrap-item {
    position: relative;
}

.scrap-item::after {
    content: "✨";
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: normal;
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 4px 12px;
    border-radius: 25px;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
    font-family: 'Segoe UI', monospace;
    z-index: 200;
    letter-spacing: 0.5px;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

/* Tooltip al hacer hover - Mensaje simple */
.scrap-item:hover::after {
    opacity: 1;
    content: "✨ Haz doble clic ✨";
}

/* Tooltip personalizado para el arándano */
.scrap-item.rotate-animation:hover::after {
    content: "🫐 Arándanos decorativos 🫐";
    background: rgba(40, 20, 60, 0.95);
}

/* Tooltip específico para el botón de currículum */
.scrap-item[data-type="cv"]:hover::after {
    content: "📄 Descargar Currículum 📄";
    background: rgba(0, 40, 60, 0.95);
}

/* Tooltip específico para el botón de contacto */
.scrap-item[data-type="contacto"]:hover::after {
    content: "📞 Ir a Contacto 📞";
    background: rgba(0, 60, 40, 0.95);
}

/* Tooltip específico para el botón de portafolio */
.scrap-item[data-type="portafolio"]:hover::after {
    content: "🎨 Ver Portafolio 🎨";
    background: rgba(60, 30, 0, 0.95);
}

/* ============================================
   WATERMARK (CRÉDITOS)
   ============================================ */
.watermark {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.85);
    font-size: 12px;
    font-family: 'Segoe UI', system-ui;
    background: rgba(0, 0, 0, 0.55);
    padding: 5px 16px;
    border-radius: 40px;
    pointer-events: none;
    z-index: 20;
    backdrop-filter: blur(4px);
    white-space: nowrap;
    letter-spacing: 0.3px;
}

/* ============================================
   RESPONSIVE PARA MÓVILES Y TABLETAS
   ============================================ */
@media (max-width: 768px) {
    .scrap-item::after {
        font-size: 9px;
        top: -28px;
        padding: 3px 8px;
        white-space: nowrap;
    }
    
    .watermark {
        font-size: 10px;
        padding: 4px 12px;
        bottom: 10px;
    }
    
    .scrap-item:hover {
        filter: drop-shadow(0 0 6px rgba(255, 235, 140, 0.4));
    }
}

/* Para pantallas muy pequeñas (menos de 480px) */
@media (max-width: 480px) {
    .scrap-item::after {
        font-size: 8px;
        top: -24px;
        padding: 2px 6px;
    }
    
    .watermark {
        font-size: 9px;
        padding: 3px 10px;
    }
}
</style>
</head>

<body>

<div class="fullscreen-container">
    <!-- FONDO -->
    <img src="img/fondo.png" class="fullscreen-img" alt="Fondo Karla Sherlyn">

    <div class="scrapbook-layer">
        <div class="watermark">© 2026 Karla Cruz | YANG´S LAB</div>

        <!-- BOTÓN CURRÍCULUM - POSICIÓN FIJA -->
        <div class="scrap-item" data-type="cv" style="top:75%; left:7%; width:18%; transform:rotate(-2deg);">
            <img src="img/Boton_curriculum.png" alt="Descargar Currículum">
        </div>

        <!-- BOTÓN CONTÁCTAME - POSICIÓN FIJA -->
        <div class="scrap-item" data-type="contacto" style="top:75%; left:31%; width:18%; transform:rotate(2deg);">
            <img src="img/Boton_contactame.png" alt="Contáctame">
        </div>

        <!-- BOTÓN PORTAFOLIO - POSICIÓN FIJA -->
        <div class="scrap-item" data-type="portafolio" style="top:45%; left:41%; width:22%; transform:rotate(1deg); z-index:5;">
            <img src="img/Boton_portafolio.png" alt="Ver Portafolio">
        </div>

        <!-- ARÁNDANO DECORATIVO CON ROTACIÓN AUTOMÁTICA -->
        <div class="scrap-item rotate-animation" data-type="deco" style="top:50%; left:12%; width:22%; transform:rotate(4deg);">
            <img src="img/Arandanos.png" alt="Arándanos decorativos">
        </div>
    </div>
</div>

<script>
// ============================================================
// FUNCIONES DE NAVEGACIÓN (COMPATIBLES CON GITHUB PAGES)
// ============================================================

// Descarga del archivo CV
function descargarCV() {
    console.log("📄 Descargando CV...");
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    setTimeout(() => document.body.removeChild(link), 150);
    console.log("✅ Descarga iniciada: docs/Karla_Cruz_CV.pdf");
}

// Navegación a contacto.html
function irContacto() {
    window.location.href = "contactame.html";
}

// Navegación a portafolio
function irPortafolio() {
    window.location.href = "portafolio/portafolio.html";
}

// ============================================================
// ASIGNAR ACCIONES A LOS BOTONES (SOLO DOBLE CLIC)
// ============================================================
function asignarAcciones() {
    const items = document.querySelectorAll('.scrap-item');
    
    items.forEach(item => {
        const img = item.querySelector('img');
        if (!img) return;
        
        const srcLower = img.src.toLowerCase();
        
        // Asignar evento de doble clic
        item.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            
            if (srcLower.includes('boton_curriculum')) {
                descargarCV();
            } else if (srcLower.includes('boton_contactame')) {
                irContacto();
            } else if (srcLower.includes('boton_portafolio')) {
                irPortafolio();
            } else if (srcLower.includes('arandanos')) {
                console.log("🫐 Arándano decorativo");
            }
        });
        
        // Prevenir cualquier intento de arrastre
        item.addEventListener('dragstart', (e) => {
            e.preventDefault();
            return false;
        });
        
        // Prevenir eventos táctiles que puedan mover
        item.addEventListener('touchstart', (e) => {
            e.preventDefault();
        });
        
        // Cursor pointer para indicar que es clickeable
        item.style.cursor = 'pointer';
    });
}

// ============================================================
// VERIFICAR RECURSOS (IMÁGENES Y PDF)
// ============================================================
function verificarRecursos() {
    const imagenes = document.querySelectorAll('img');
    imagenes.forEach(img => {
        img.onerror = () => {
            console.warn(`⚠️ Imagen no encontrada: ${img.src}`);
            img.style.border = "1px dashed rgba(255,80,80,0.6)";
        };
        img.onload = () => {
            console.log(`✅ Imagen cargada: ${img.src.split('/').pop()}`);
        };
    });
    
    // Verificar PDF
    fetch('docs/Karla_Cruz_CV.pdf', { method: 'HEAD' })
        .then(resp => {
            if (resp.ok) {
                console.log("✅ PDF disponible en docs/Karla_Cruz_CV.pdf");
            } else {
                console.warn("⚠️ PDF no encontrado en docs/Karla_Cruz_CV.pdf");
            }
        })
        .catch(() => console.warn("⚠️ No se pudo verificar el PDF"));
}

// ============================================================
// ASEGURAR ANIMACIÓN DEL ARÁNDANO
// ============================================================
function asegurarAnimacionArandano() {
    const arandano = document.querySelector('.scrap-item[data-type="deco"]');
    if (arandano && !arandano.classList.contains('rotate-animation')) {
        arandano.classList.add('rotate-animation');
        console.log("🫐 Animación del arándano asegurada");
    }
}

// ============================================================
// INICIALIZACIÓN
// ============================================================
window.onload = () => {
    // Asignar acciones a los botones
    asignarAcciones();
    
    // Verificar imágenes y recursos
    verificarRecursos();
    
    // Asegurar animación del arándano
    asegurarAnimacionArandano();
    
    console.log("%c✨ CV INTERACTIVO - KARLA SHERLYN ✨", "color: #ff4d6d; font-size: 14px; font-weight: bold");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
    console.log("🔒 Elementos fijos en su posición");
    console.log("✅ Haz doble clic en los botones:");
    console.log("   📄 Currículum → descarga PDF");
    console.log("   📞 Contáctame → contactame.html");
    console.log("   🎨 Portafolio → portafolio/portafolio.html");
    console.log("🫐 Arándano → rotación automática");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
};
</script>

</body>
</html>
