<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Karla Sherlyn · Curriculum Vitae</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    overflow-x: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
}

.fullscreen-container {
    position: relative;
    min-height: 100vh;
    width: 100%;
}

.fullscreen-img {
    width: 100%;
    display: block;
    pointer-events: none;
    user-select: none;
}

.scrapbook-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* ELEMENTOS COMPLETAMENTE FIJOS */
.scrap-item {
    position: absolute;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transform-origin: center center;
    transition: filter 0.2s ease;
    /* Bloqueo total de movimiento */
    touch-action: none;
}

.scrap-item:hover {
    filter: brightness(1.05) drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}

.scrap-item:active {
    transform: scale(0.98);
    transition: transform 0.05s ease;
}

.scrap-item img {
    width: 100%;
    height: auto;
    display: block;
    pointer-events: none;
    border-radius: 4px;
    user-drag: none;
    -webkit-user-drag: none;
}

/* Animación decorativa arándanos */
.rotate-animation {
    animation: blueberryFloat 25s infinite ease-in-out;
}

@keyframes blueberryFloat {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-5px) rotate(2deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}

.watermark {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.8);
    font-size: 12px;
    background: rgba(0, 0, 0, 0.5);
    padding: 5px 16px;
    border-radius: 40px;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
}

img {
    user-drag: none;
    -webkit-user-drag: none;
    user-select: none;
    -webkit-user-select: none;
}

@media (max-width: 768px) {
    .watermark {
        font-size: 10px;
        padding: 4px 12px;
    }
    .scrap-item:hover {
        filter: none;
    }
}
</style>
</head>
<body>

<div class="fullscreen-container">
    <img src="img/fondo.png" class="fullscreen-img" alt="Fondo">

    <div class="scrapbook-layer">
        <div class="watermark">© 2026 Karla Cruz | YANG´S LAB</div>

        <!-- BOTÓN CURRÍCULUM -->
        <div class="scrap-item" id="btn-cv" style="top:75%; left:7%; width:18%; transform:rotate(-2deg);">
            <img src="img/Boton_curriculum.png" alt="Currículum" draggable="false">
        </div>

        <!-- BOTÓN CONTÁCTAME -->
        <div class="scrap-item" id="btn-contacto" style="top:75%; left:31%; width:18%; transform:rotate(2deg);">
            <img src="img/Boton_contactame.png" alt="Contacto" draggable="false">
        </div>

        <!-- BOTÓN PORTAFOLIO -->
        <div class="scrap-item" id="btn-portafolio" style="top:45%; left:41%; width:22%; transform:rotate(1deg);">
            <img src="img/Boton_portafolio.png" alt="Portafolio" draggable="false">
        </div>

        <!-- DECORACIÓN ARÁNDANOS -->
        <div class="scrap-item rotate-animation" id="btn-deco" style="top:50%; left:12%; width:22%; transform:rotate(4deg);">
            <img src="img/Arandanos.png" alt="Arándanos" draggable="false">
        </div>
    </div>
</div>

<script>
// ============================================================
// FUNCIONES DE CADA BOTÓN - SEPARADAS Y CLARAS
// ============================================================

// 1. CURRÍCULUM - Descargar PDF
function accionCurriculum() {
    console.log("📄 HACIENDO CLICK EN CURRÍCULUM - Descargando PDF...");
    try {
        const link = document.createElement('a');
        link.href = "docs/Karla_Cruz_CV.pdf";
        link.download = "Karla_Cruz_CV.pdf";
        document.body.appendChild(link);
        link.click();
        setTimeout(() => {
            document.body.removeChild(link);
        }, 100);
        alert("Descargando Currículum Vitae...");
    } catch(error) {
        console.error("Error al descargar:", error);
        alert("Error al descargar el CV. Verifica que el archivo existe en: docs/Karla_Cruz_CV.pdf");
    }
}

// 2. CONTÁCTAME - Redirigir a contactame.html
function accionContacto() {
    console.log("📞 HACIENDO CLICK EN CONTÁCTAME - Redirigiendo a contactame.html...");
    try {
        window.location.href = "http://127.0.0.1:5500/02-maquetacion-cv/contactame.html";
    } catch(error) {
        console.error("Error al redirigir:", error);
        alert("Error al redirigir a la página de contacto");
    }
}

// 3. PORTAFOLIO - Redirigir a portafolio.html
function accionPortafolio() {
    console.log("🎨 HACIENDO CLICK EN PORTAFOLIO - Redirigiendo a portafolio.html...");
    try {
        window.location.href = "http://127.0.0.1:5500/02-maquetacion-cv/portafolio/portafolio.html";
    } catch(error) {
        console.error("Error al redirigir:", error);
        alert("Error al redirigir a la página de portafolio");
    }
}

// 4. DECORATIVO
function accionDecorativo() {
    console.log("🫐 HACIENDO CLICK EN ARÁNDANOS - Elemento decorativo");
}

// ============================================================
// ASIGNAR EVENTOS - CADA BOTÓN CON SU PROPIA FUNCIÓN
// ============================================================

function asignarBotones() {
    // Botón CURRÍCULUM
    const btnCV = document.getElementById('btn-cv');
    if (btnCV) {
        // Eliminar cualquier evento anterior
        btnCV.removeEventListener('click', accionCurriculum);
        // Agregar el evento nuevo
        btnCV.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            accionCurriculum();
            return false;
        });
        console.log("✅ Botón CURRÍCULUM configurado correctamente");
    } else {
        console.error("❌ ERROR: No se encontró el botón con id 'btn-cv'");
    }
    
    // Botón CONTÁCTAME
    const btnContacto = document.getElementById('btn-contacto');
    if (btnContacto) {
        btnContacto.removeEventListener('click', accionContacto);
        btnContacto.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            accionContacto();
            return false;
        });
        console.log("✅ Botón CONTÁCTAME configurado correctamente");
    } else {
        console.error("❌ ERROR: No se encontró el botón con id 'btn-contacto'");
    }
    
    // Botón PORTAFOLIO
    const btnPortafolio = document.getElementById('btn-portafolio');
    if (btnPortafolio) {
        btnPortafolio.removeEventListener('click', accionPortafolio);
        btnPortafolio.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            accionPortafolio();
            return false;
        });
        console.log("✅ Botón PORTAFOLIO configurado correctamente");
    } else {
        console.error("❌ ERROR: No se encontró el botón con id 'btn-portafolio'");
    }
    
    // Botón DECORATIVO
    const btnDeco = document.getElementById('btn-deco');
    if (btnDeco) {
        btnDeco.removeEventListener('click', accionDecorativo);
        btnDeco.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            accionDecorativo();
            return false;
        });
        console.log("✅ Botón DECORATIVO configurado correctamente");
    }
}

// ============================================================
// BLOQUEAR CUALQUIER MOVIMIENTO
// ============================================================

function bloquearMovimiento() {
    const elementos = document.querySelectorAll('.scrap-item');
    
    elementos.forEach(el => {
        // Bloquear eventos de arrastre
        el.addEventListener('dragstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });
        
        el.addEventListener('mousedown', (e) => {
            // Permitimos el click pero evitamos cualquier arrastre
            if (e.button === 0) {
                // No prevenimos el default completamente para permitir el click
                // Solo prevenimos si es movimiento
            }
        });
        
        el.ondragstart = () => false;
        el.onselectstart = () => false;
        
        // Estilos para bloquear visualmente
        el.style.userSelect = 'none';
        el.style.webkitUserSelect = 'none';
        el.style.touchAction = 'none';
    });
}

// ============================================================
// VERIFICAR IMÁGENES Y RECURSOS
// ============================================================

function verificarRecursos() {
    // Verificar imágenes
    const imagenes = document.querySelectorAll('.scrap-item img');
    imagenes.forEach(img => {
        img.onerror = function() {
            console.warn(`⚠️ Imagen no encontrada: ${img.src}`);
            img.style.opacity = '0.5';
            img.style.backgroundColor = '#333';
            img.style.padding = '20px';
        };
        img.onload = function() {
            console.log(`✅ Imagen OK: ${img.src.split('/').pop()}`);
        };
    });
    
    // Verificar PDF (opcional)
    fetch('docs/Karla_Cruz_CV.pdf', { method: 'HEAD' })
        .then(resp => {
            if (resp.ok) {
                console.log("✅ PDF disponible en: docs/Karla_Cruz_CV.pdf");
            } else {
                console.warn("⚠️ PDF no encontrado en: docs/Karla_Cruz_CV.pdf");
            }
        })
        .catch(() => console.warn("⚠️ No se pudo verificar el PDF"));
}

// ============================================================
// CARGAR POSICIONES GUARDADAS (OPCIONAL)
// ============================================================

function cargarPosiciones() {
    const saved = localStorage.getItem('karla_layout');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            const items = document.querySelectorAll('.scrap-item');
            items.forEach((el, i) => {
                if (data[i]) {
                    if (data[i].top) el.style.top = data[i].top;
                    if (data[i].left) el.style.left = data[i].left;
                    if (data[i].width) el.style.width = data[i].width;
                    if (data[i].transform) el.style.transform = data[i].transform;
                }
            });
            console.log("📂 Posiciones guardadas cargadas");
        } catch(e) {
            console.warn("Error al cargar posiciones:", e);
        }
    }
}

// ============================================================
// INICIALIZACIÓN PRINCIPAL
// ============================================================

function inicializar() {
    console.log("%c🚀 INICIANDO CV KARLA SHERLYN", "color: #ff4d6d; font-size: 16px; font-weight: bold");
    
    // Cargar posiciones guardadas
    cargarPosiciones();
    
    // Asignar eventos a los botones
    asignarBotones();
    
    // Bloquear movimiento
    bloquearMovimiento();
    
    // Verificar recursos
    verificarRecursos();
    
    // Eliminar cualquier residuo de edición
    document.querySelectorAll('.scrap-item').forEach(el => {
        el.classList.remove('selected');
    });
    
    // Mostrar resumen en consola
    console.log("%c━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "color: #888");
    console.log("%c🔒 ELEMENTOS FIJOS - NO SE PUEDEN MOVER", "color: #4CAF50; font-weight: bold");
    console.log("%c📄 CURRÍCULUM → Descarga PDF", "color: #ff4d6d");
    console.log("%c📞 CONTÁCTAME → contactame.html", "color: #ff4d6d");
    console.log("%c🎨 PORTAFOLIO → portafolio.html", "color: #ff4d6d");
    console.log("%c🫐 ARÁNDANOS → Solo decorativo", "color: #888");
    console.log("%c━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "color: #888");
    console.log("%c💡 Si algún botón no funciona, revisa la consola para ver errores", "color: #ffa500");
}

// Ejecutar cuando el DOM esté listo
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', inicializar);
} else {
    inicializar();
}

// Bloqueo adicional a nivel de documento para prevenir arrastres
document.addEventListener('dragstart', function(e) {
    if (e.target.closest('.scrap-item')) {
        e.preventDefault();
        return false;
    }
});

document.addEventListener('touchmove', function(e) {
    if (e.target.closest('.scrap-item')) {
        e.preventDefault();
        return false;
    }
}, { passive: false });
</script>

</body>
</html>
