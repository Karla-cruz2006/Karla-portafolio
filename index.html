<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karla Sherlyn · Curriculum Vitae · Editor Visual</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    overflow-x: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.fullscreen-container {
    position: relative;
    min-height: 100vh;
    width: 100%;
}

.fullscreen-img {
    width: 100%;
    display: block;
    pointer-events: none;
}

.scrapbook-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* ELEMENTOS EDITABLES */
.scrap-item {
    position: absolute;
    cursor: grab;
    user-select: none;
    transform-origin: center center;
}

.scrap-item:active {
    cursor: grabbing;
}

.scrap-item img {
    width: 100%;
    height: auto;
    display: block;
    pointer-events: none;
}

/* ELEMENTO SELECCIONADO */
.scrap-item.selected {
    outline: 3px solid #ff4d6d;
    outline-offset: 5px;
    filter: drop-shadow(0 0 8px rgba(255, 77, 109, 0.4));
    z-index: 1000 !important;
}

/* ===== CÍRCULOS DE EDICIÓN ===== */
.resize-handle {
    position: absolute;
    width: 24px;
    height: 24px;
    background: #ff4d6d;
    border-radius: 50%;
    bottom: -12px;
    right: -12px;
    cursor: nwse-resize;
    z-index: 1001;
    border: 2px solid white;
    box-shadow: 0 0 10px rgba(255, 77, 109, 0.8);
    transition: transform 0.15s ease, background 0.15s ease;
}

.resize-handle:hover {
    transform: scale(1.2);
    background: #ff1e4d;
}

.rotate-handle {
    position: absolute;
    width: 24px;
    height: 24px;
    background: #4d9eff;
    border-radius: 50%;
    top: -12px;
    left: -12px;
    cursor: grab;
    z-index: 1001;
    border: 2px solid white;
    box-shadow: 0 0 10px rgba(77, 158, 255, 0.8);
    transition: transform 0.15s ease, background 0.15s ease;
}

.rotate-handle:hover {
    transform: scale(1.2);
    background: #2b7be6;
}

.rotate-handle:active {
    cursor: grabbing;
}

/* ANIMACIÓN ARÁNDANO */
.rotate-animation {
    animation: blueberryRotate 40s linear infinite;
    transform-origin: center center;
}

@keyframes blueberryRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* WATERMARK */
.watermark {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.8);
    font-size: 12px;
    background: rgba(0, 0, 0, 0.5);
    padding: 5px 16px;
    border-radius: 40px;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
}

@media (max-width: 768px) {
    .resize-handle, .rotate-handle {
        width: 18px;
        height: 18px;
    }
    .resize-handle { bottom: -9px; right: -9px; }
    .rotate-handle { top: -9px; left: -9px; }
    .watermark { font-size: 10px; padding: 4px 12px; }
}
</style>
</head>

<body>

<div class="fullscreen-container">
    <img src="img/fondo.png" class="fullscreen-img" alt="Fondo">

    <div class="scrapbook-layer">
        <div class="watermark">© 2026 Karla Cruz | YANG´S LAB</div>

        <div class="scrap-item" data-type="cv" style="top:75%; left:7%; width:18%; transform:rotate(-2deg);">
            <img src="img/Boton_curriculum.png" alt="Currículum">
        </div>

        <div class="scrap-item" data-type="contacto" style="top:75%; left:31%; width:18%; transform:rotate(2deg);">
            <img src="img/Boton_contactame.png" alt="Contacto">
        </div>

        <div class="scrap-item" data-type="portafolio" style="top:45%; left:41%; width:22%; transform:rotate(1deg);">
            <img src="img/Boton_portafolio.png" alt="Portafolio">
        </div>

        <div class="scrap-item rotate-animation" data-type="deco" style="top:50%; left:12%; width:22%; transform:rotate(4deg);">
            <img src="img/Arandanos.png" alt="Arándanos">
        </div>
    </div>
</div>

<script>
// ============================================================
// FUNCIONES DE NAVEGACIÓN (BOTONES)
// ============================================================

function descargarCV() {
    console.log("📄 Descargando CV...");
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    document.body.appendChild(link);
    link.click();
    setTimeout(() => document.body.removeChild(link), 100);
}

function irContacto() {
    console.log("📞 Navegando a contactame.html");
    window.location.href = "contactame.html";
}

function irPortafolio() {
    console.log("🎨 Navegando a portafolio/portafolio.html");
    window.location.href = "portafolio/portafolio.html";
}

// ============================================================
// EDITOR COMPLETO CON GUARDADO AUTOMÁTICO
// ============================================================

let selected = null;
let mode = null;
let startX, startY, startLeft, startTop, startW, startRotAngle, currentRot;

function getRotation(el) {
    const transform = el.style.transform;
    const match = transform.match(/rotate\(([-\d.]+)deg\)/);
    return match ? parseFloat(match[1]) : 0;
}

function setRotation(el, deg) {
    el.style.transform = `rotate(${deg}deg)`;
}

// Convertir posición de porcentaje a píxeles
function convertToPixels(el) {
    const parentRect = el.parentElement.getBoundingClientRect();
    const rect = el.getBoundingClientRect();
    
    if (el.style.left && el.style.left.includes('px')) return;
    
    const leftPx = rect.left - parentRect.left;
    const topPx = rect.top - parentRect.top;
    
    el.style.left = leftPx + 'px';
    el.style.top = topPx + 'px';
}

function createHandles(el) {
    el.querySelectorAll('.resize-handle, .rotate-handle').forEach(h => h.remove());
    
    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'resize-handle';
    el.appendChild(resizeHandle);
    
    const rotateHandle = document.createElement('div');
    rotateHandle.className = 'rotate-handle';
    el.appendChild(rotateHandle);
    
    resizeHandle.onmousedown = (e) => {
        e.stopPropagation();
        mode = 'resize';
        startX = e.clientX;
        startW = el.offsetWidth;
        e.preventDefault();
    };
    
    rotateHandle.onmousedown = (e) => {
        e.stopPropagation();
        mode = 'rotate';
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        startRotAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
        currentRot = getRotation(el);
        e.preventDefault();
    };
}

function selectElement(el) {
    if (selected === el) return;
    if (selected) selected.classList.remove('selected');
    
    convertToPixels(el);
    
    selected = el;
    selected.classList.add('selected');
    createHandles(selected);
}

function startDrag(el, e) {
    convertToPixels(el);
    
    mode = 'drag';
    selected = el;
    const rect = el.getBoundingClientRect();
    const parentRect = el.parentElement.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startLeft = rect.left - parentRect.left;
    startTop = rect.top - parentRect.top;
    e.preventDefault();
}

// ===== GUARDAR POSICIONES EN LOCALSTORAGE =====
function savePositions() {
    const items = document.querySelectorAll('.scrap-item');
    const data = [];
    items.forEach(el => {
        data.push({
            top: el.style.top,
            left: el.style.left,
            width: el.style.width,
            transform: el.style.transform
        });
    });
    localStorage.setItem('karla_layout', JSON.stringify(data));
    console.log("💾 Posiciones guardadas");
}

// ===== CARGAR POSICIONES GUARDADAS =====
function loadPositions() {
    const saved = localStorage.getItem('karla_layout');
    if (!saved) {
        console.log("📂 No hay posiciones guardadas");
        return;
    }
    try {
        const data = JSON.parse(saved);
        const items = document.querySelectorAll('.scrap-item');
        items.forEach((el, i) => {
            if (data[i]) {
                if (data[i].top) el.style.top = data[i].top;
                if (data[i].left) el.style.left = data[i].left;
                if (data[i].width) el.style.width = data[i].width;
                if (data[i].transform) el.style.transform = data[i].transform;
            }
        });
        console.log("📂 Posiciones cargadas");
    } catch(e) {
        console.warn("Error al cargar:", e);
    }
}

// ===== EVENTOS GLOBALES =====
document.onmousemove = (e) => {
    if (!selected) return;
    
    if (mode === 'drag') {
        selected.style.left = (startLeft + (e.clientX - startX)) + 'px';
        selected.style.top = (startTop + (e.clientY - startY)) + 'px';
    }
    
    if (mode === 'resize') {
        let newW = Math.max(60, startW + (e.clientX - startX));
        selected.style.width = newW + 'px';
    }
    
    if (mode === 'rotate') {
        const rect = selected.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const ang = Math.atan2(e.clientY - cy, e.clientX - cx);
        let delta = (ang - startRotAngle) * 180 / Math.PI;
        setRotation(selected, currentRot + delta);
    }
};

document.onmouseup = () => {
    if (mode && selected) {
        savePositions();  // GUARDADO AUTOMÁTICO
    }
    mode = null;
};

// ===== ASIGNAR EVENTOS A CADA ELEMENTO =====
function bindEvents() {
    document.querySelectorAll('.scrap-item').forEach(el => {
        el.onclick = (e) => {
            e.stopPropagation();
            selectElement(el);
        };
        
        el.onmousedown = (e) => {
            if (e.target.classList.contains('resize-handle') || 
                e.target.classList.contains('rotate-handle')) return;
            startDrag(el, e);
        };
    });
}

// ===== DOBLE CLIC PARA ACCIONES DE BOTONES =====
function bindActions() {
    document.querySelectorAll('.scrap-item').forEach(el => {
        el.ondblclick = (e) => {
            e.stopPropagation();
            const src = el.querySelector('img').src.toLowerCase();
            if (src.includes('curriculum')) {
                descargarCV();
            } else if (src.includes('contactame')) {
                irContacto();
            } else if (src.includes('portafolio')) {
                irPortafolio();
            } else if (src.includes('arandanos')) {
                console.log("🫐 Arándano decorativo");
            }
        };
    });
}

// ===== ROTACIÓN CON TECLADO Q/E =====
document.addEventListener('keydown', (e) => {
    if (!selected) return;
    const key = e.key.toLowerCase();
    let rot = getRotation(selected);
    if (key === 'q') { 
        setRotation(selected, rot - 5); 
        savePositions();
        console.log(`🔄 Rotación: ${rot - 5}°`);
    }
    if (key === 'e') { 
        setRotation(selected, rot + 5); 
        savePositions();
        console.log(`🔄 Rotación: ${rot + 5}°`);
    }
});

// ===== CLIC FUERA DESELECCIONA =====
document.body.addEventListener('click', (e) => {
    if (!e.target.closest('.scrap-item') && selected) {
        selected.classList.remove('selected');
        selected = null;
    }
});

// ===== VERIFICAR RECURSOS =====
function checkResources() {
    const images = document.querySelectorAll('img');
    images.forEach(img => {
        img.onerror = () => console.warn(`⚠️ Imagen no encontrada: ${img.src}`);
        img.onload = () => console.log(`✅ Imagen: ${img.src.split('/').pop()}`);
    });
    
    fetch('docs/Karla_Cruz_CV.pdf', { method: 'HEAD' })
        .then(res => res.ok ? console.log("✅ PDF disponible") : console.warn("⚠️ PDF no encontrado"))
        .catch(() => console.warn("⚠️ No se pudo verificar PDF"));
}

// ============================================================
// INICIALIZACIÓN
// ============================================================
window.onload = () => {
    loadPositions();
    bindEvents();
    bindActions();
    checkResources();
    
    console.log("%c✨ EDITOR ACTIVADO - GUARDADO AUTOMÁTICO ✨", "color: #ff4d6d; font-size: 14px; font-weight: bold");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
    console.log("✅ CLIC: Seleccionar elemento (aparecen círculos)");
    console.log("✅ ARRASTRAR: Mover elemento");
    console.log("✅ CÍRCULO ROSADO: Redimensionar");
    console.log("✅ CÍRCULO AZUL: Rotar");
    console.log("✅ TECLAS Q / E: Rotar elemento seleccionado");
    console.log("✅ DOBLE CLIC: Ejecutar acción del botón");
    console.log("✅ Las posiciones se guardan AUTOMÁTICAMENTE");
    console.log("✅ Al recargar, los elementos mantienen su lugar");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
};
</script>

</body>
</html>
