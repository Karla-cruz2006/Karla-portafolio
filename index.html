<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Karla Sherlyn · Curriculum Vitae</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='.9em' font-size='90'>🦖</text>
</svg>">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    overflow-x: hidden;
}

/* CONTENEDOR */
.fullscreen-container {
    position: relative;
    min-height: 100vh;
}

/* FONDO */
.fullscreen-img {
    width: 100%;
    height: auto;
    display: block;
    pointer-events: none;
}

/* CAPA */
.scrapbook-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* ELEMENTOS */
.scrap-item {
    position: absolute;
    cursor: grab;
}

.scrap-item:active {
    cursor: grabbing;
}

.scrap-item img {
    width: 100%;
    display: block;
}

/* HANDLES */
.resize-handle, .rotate-handle {
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid white;
    z-index: 999;
}

.resize-handle {
    background: #ff4d6d;
    bottom: -8px;
    right: -8px;
    cursor: nwse-resize;
}

.rotate-handle {
    background: #4d9eff;
    top: -8px;
    left: -8px;
    cursor: grab;
}

/* WATERMARK */
.watermark {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 12px;
    background: rgba(0,0,0,0.6);
    padding: 4px 12px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="fullscreen-container">
    <img src="img/fondo.png" class="fullscreen-img">

    <div class="scrapbook-layer">

        <div class="watermark">
            © 2026 Karla Cruz | YANG´S LAB
        </div>

        <!-- BOTÓN CONTACTO -->
        <div class="scrap-item" style="top:75%; left:31%; width:18%;">
            <img src="img/Boton_contactame.png">
        </div>

        <!-- BOTÓN PORTAFOLIO -->
        <div class="scrap-item" style="top:45%; left:41%; width:22%;">
            <img src="img/Boton_portafolio.png">
        </div>

        <!-- BOTÓN CV -->
        <div class="scrap-item" style="top:75%; left:7%; width:18%;">
            <img src="img/Boton_curriculum.png">
        </div>

    </div>
</div>

<script>
// ===== FUNCIONES =====
function descargarCV(){
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function irContacto(){
    window.location.href = "contactame.html";
}

function irPortafolio(){
    window.location.href = "portafolio/portafolio.html";
}

// ===== INTERACCIÓN =====
let selected = null;
let isDragging = false;
let isResizing = false;
let isRotating = false;
let startX, startY, startLeft, startTop, startWidth;
let startAngle = 0;
let currentAngle = 0;

function createHandles(el){
    el.querySelectorAll('.resize-handle, .rotate-handle').forEach(h=>h.remove());

    const resize = document.createElement("div");
    resize.className = "resize-handle";

    const rotate = document.createElement("div");
    rotate.className = "rotate-handle";

    el.appendChild(resize);
    el.appendChild(rotate);

    resize.onmousedown = e=>{
        e.stopPropagation();
        isResizing = true;
        startX = e.clientX;
        startWidth = el.offsetWidth;
        document.onmousemove = e=>{
            el.style.width = Math.max(50, startWidth + (e.clientX - startX)) + "px";
        };
        document.onmouseup = ()=> document.onmousemove=null;
    };

    rotate.onmousedown = e=>{
        e.stopPropagation();
        isRotating = true;
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;

        startAngle = Math.atan2(e.clientY-cy, e.clientX-cx)*180/Math.PI;

        const match = el.style.transform.match(/rotate\(([-\d.]+)deg\)/);
        currentAngle = match ? parseFloat(match[1]) : 0;

        document.onmousemove = e=>{
            let ang = Math.atan2(e.clientY-cy, e.clientX-cx)*180/Math.PI;
            el.style.transform = `rotate(${currentAngle + (ang-startAngle)}deg)`;
        };
        document.onmouseup = ()=> document.onmousemove=null;
    };
}

document.querySelectorAll(".scrap-item").forEach(el=>{
    const img = el.querySelector("img");

    el.addEventListener("click", e=>{
        e.stopPropagation();
        if(selected) selected.style.outline="none";
        selected = el;
        el.style.outline="2px dashed pink";
        createHandles(el);
    });

    el.addEventListener("dblclick", ()=>{
        const src = img.src.toLowerCase();
        if(src.includes("curriculum")) descargarCV();
        if(src.includes("contactame")) irContacto();
        if(src.includes("portafolio")) irPortafolio();
    });

    el.addEventListener("mousedown", e=>{
        if(e.target.classList.contains("resize-handle") || e.target.classList.contains("rotate-handle")) return;

        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startLeft = el.offsetLeft;
        startTop = el.offsetTop;

        document.onmousemove = e=>{
            el.style.left = (startLeft + (e.clientX-startX)) + "px";
            el.style.top = (startTop + (e.clientY-startY)) + "px";
        };

        document.onmouseup = ()=> document.onmousemove=null;
    });
});
</script>

</body>
</html>
