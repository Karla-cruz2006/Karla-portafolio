<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karla Sherlyn · Curriculum Vitae</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<text y='.9em' font-size='90'>🦖</text>
</svg>">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    overflow:hidden;
}

/* CONTENEDOR */
.fullscreen-container{
    position:relative;
    width:100vw;
    height:100vh;
}

/* FONDO */
.fullscreen-img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* CAPA */
.scrapbook-layer{
    position:absolute;
    width:100%;
    height:100%;
}

/* ELEMENTOS */
.scrap-item{
    position:absolute;
    cursor:grab;
}

.scrap-item:active{
    cursor:grabbing;
}

.scrap-item img{
    width:100%;
    display:block;
}

/* HANDLES */
.resize-handle,.rotate-handle{
    position:absolute;
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid white;
}

.resize-handle{
    background:#ff4d6d;
    bottom:-8px;
    right:-8px;
    cursor:nwse-resize;
}

.rotate-handle{
    background:#4d9eff;
    top:-8px;
    left:-8px;
    cursor:grab;
}

/* WATERMARK */
.watermark{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:12px;
    background:rgba(0,0,0,0.6);
    padding:4px 12px;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="fullscreen-container">
    <img src="img/fondo.png" class="fullscreen-img">

    <div class="scrapbook-layer">

        <div class="watermark">
            © 2026 Karla Cruz | YANG´S LAB
        </div>

        <!-- CONTACTO -->
        <div class="scrap-item" style="top:75%; left:31%; width:18%;">
            <img src="img/Boton_contactame.png">
        </div>

        <!-- PORTAFOLIO -->
        <div class="scrap-item" style="top:45%; left:41%; width:22%;">
            <img src="img/Boton_portafolio.png">
        </div>

        <!-- CV -->
        <div class="scrap-item" style="top:75%; left:7%; width:18%;">
            <img src="img/Boton_curriculum.png">
        </div>

    </div>
</div>

<script>
// ===== FUNCIONES =====
function descargarCV(){
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    link.click();
}

// ✅ CONTACTO (CORRECTO PARA LOCAL Y GITHUB)
function irContacto(){
    window.location.href = "contactame.html";
}

// PORTAFOLIO
function irPortafolio(){
    window.location.href = "portafolio.html";
}

// ===== GUARDAR =====
function save(){
    const data=[];
    document.querySelectorAll(".scrap-item").forEach(el=>{
        data.push({
            top:el.style.top,
            left:el.style.left,
            width:el.style.width,
            transform:el.style.transform
        });
    });
    localStorage.setItem("layout",JSON.stringify(data));
}

// ===== CARGAR =====
function load(){
    const data=JSON.parse(localStorage.getItem("layout"));
    if(!data) return;
    document.querySelectorAll(".scrap-item").forEach((el,i)=>{
        if(data[i]){
            el.style.top=data[i].top;
            el.style.left=data[i].left;
            el.style.width=data[i].width;
            el.style.transform=data[i].transform;
        }
    });
}

// ===== INTERACCIÓN =====
let selected=null;

function createHandles(el){
    el.querySelectorAll(".resize-handle,.rotate-handle").forEach(h=>h.remove());

    const r=document.createElement("div");
    r.className="resize-handle";

    const rot=document.createElement("div");
    rot.className="rotate-handle";

    el.appendChild(r);
    el.appendChild(rot);

    // RESIZE
    r.onmousedown=e=>{
        e.stopPropagation();
        let startX=e.clientX;
        let startW=el.offsetWidth;

        document.onmousemove=e=>{
            el.style.width=Math.max(50,startW+(e.clientX-startX))+"px";
            save();
        };

        document.onmouseup=()=>document.onmousemove=null;
    };

    // ROTATE
    rot.onmousedown=e=>{
        e.stopPropagation();

        const rect=el.getBoundingClientRect();
        const cx=rect.left+rect.width/2;
        const cy=rect.top+rect.height/2;

        let startA=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI;

        let current=0;
        let match=el.style.transform.match(/rotate\(([-\d.]+)deg\)/);
        if(match) current=parseFloat(match[1]);

        document.onmousemove=e=>{
            let ang=Math.atan2(e.clientY-cy,e.clientX-cx)*180/Math.PI;
            el.style.transform=`rotate(${current+(ang-startA)}deg)`;
            save();
        };

        document.onmouseup=()=>document.onmousemove=null;
    };
}

// ===== ELEMENTOS =====
document.querySelectorAll(".scrap-item").forEach(el=>{
    const img=el.querySelector("img");

    el.onclick=e=>{
        e.stopPropagation();
        if(selected) selected.style.outline="none";
        selected=el;
        el.style.outline="2px dashed pink";
        createHandles(el);
    };

    el.ondblclick=()=>{
        const src=img.src.toLowerCase();

        if(src.includes("curriculum")) descargarCV();
        if(src.includes("contactame")) irContacto();
        if(src.includes("portafolio")) irPortafolio();
    };

    el.onmousedown=e=>{
        if(e.target.classList.contains("resize-handle") || e.target.classList.contains("rotate-handle")) return;

        let startX=e.clientX;
        let startY=e.clientY;
        let startL=el.offsetLeft;
        let startT=el.offsetTop;

        document.onmousemove=e=>{
            el.style.left=(startL+(e.clientX-startX))+"px";
            el.style.top=(startT+(e.clientY-startY))+"px";
            save();
        };

        document.onmouseup=()=>document.onmousemove=null;
    };
});

// INIT
window.onload=load;
</script>

</body>
</html>
