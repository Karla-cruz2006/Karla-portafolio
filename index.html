<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karla Sherlyn · Curriculum Vitae</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="fullscreen-container">
    <img src="img/fondo.png" class="fullscreen-img" alt="Fondo">

    <div class="scrapbook-layer">

        <div class="watermark">
            © 2026 Karla Cruz | YANG´S LAB
        </div>

        <!-- BOTÓN CV -->
        <div class="scrap-item" style="top:500px; left:120px; width:220px;">
            <img src="img/Boton_curriculum.png">
        </div>

        <!-- BOTÓN CONTACTO -->
        <div class="scrap-item" style="top:500px; left:420px; width:220px;">
            <img src="img/Boton_contactame.png">
        </div>

        <!-- BOTÓN PORTAFOLIO -->
        <div class="scrap-item" style="top:300px; left:550px; width:260px;">
            <img src="img/Boton_portafolio.png">
        </div>

        <!-- ARÁNDANOS -->
        <div class="scrap-item rotate-animation" style="top:320px; left:150px; width:250px;">
            <img src="img/Arandanos.png">
        </div>

    </div>
</div>

<script>
function descargarCV() {
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function irContacto() {
    window.location.href = "contactame.html"; // 🔥 corregido
}

function irPortafolio() {
    window.location.href = "portafolio/portafolio.html";
}

let selected = null;

function asignarFuncionesBotones() {
    document.querySelectorAll('.scrap-item').forEach(el => {
        const img = el.querySelector('img');
        if(!img) return;

        const src = img.src.toLowerCase();

        el.addEventListener('dblclick', () => {
            if(src.includes('boton_curriculum')) descargarCV();
            else if(src.includes('boton_contactame')) irContacto();
            else if(src.includes('boton_portafolio')) irPortafolio();
        });
    });
}

window.onload = asignarFuncionesBotones;
</script>

</body>
</html>
