<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Karla Sherlyn · Curriculum Vitae · Editor Visual</title>

<!-- ✅ ANTI-CACHÉ para ver siempre los cambios más recientes -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
/* ===== RESET Y BASE ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none; /* Evita selección de texto mientras se arrastra, pero no afecta clics */
}

body {
    background: #000;
    overflow-x: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

/* CONTENEDOR PRINCIPAL: respeta el flujo del fondo */
.fullscreen-container {
    position: relative;
    min-height: 100vh;
    width: 100%;
}

/* FONDO: imagen a ancho completo, sin distorsión */
.fullscreen-img {
    width: 100%;
    display: block;
    pointer-events: none;  /* Para que el fondo no interfiera con clics en elementos */
}

/* CAPA DE ELEMENTOS SUPERPUESTOS (scrapbook) */
.scrapbook-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* CADA ELEMENTO: posicionamiento absoluto, cursor interactivo */
.scrap-item {
    position: absolute;
    cursor: grab;
    transition: box-shadow 0.1s ease, outline 0.05s linear;
    will-change: transform, left, top, width;
}

.scrap-item:active {
    cursor: grabbing;
}

/* Las imágenes dentro de los elementos responden al tamaño del contenedor */
.scrap-item img {
    width: 100%;
    display: block;
    pointer-events: auto;    /* Para que reciban clics y arrastres */
    border-radius: 0;       /* Sin redondeo para mantener diseño original */
}

/* ===== MANIJAS ===== */
.resize-handle {
    position: absolute;
    width: 22px;
    height: 22px;
    background: #ff4d6d;
    border-radius: 50%;
    bottom: -11px;
    right: -11px;
    cursor: nwse-resize;
    z-index: 999;
    border: 2px solid white;
    box-shadow: 0 0 8px rgba(255, 77, 109, 0.7);
    transition: transform 0.1s ease, background 0.1s;
}

.resize-handle:hover {
    transform: scale(1.15);
    background: #ff1e4d;
}

.rotate-handle {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #4d9eff;
    border-radius: 50%;
    top: 6px;
    left: 6px;
    cursor: grab;
    z-index: 999;
    border: 2px solid white;
    box-shadow: 0 0 6px rgba(0, 0, 0, 0.5);
}

.rotate-handle:active {
    cursor: grabbing;
}

/* ===== ESTADO SELECCIONADO ===== */
.scrap-item.selected {
    outline: 3px solid #ff4d6d;
    outline-offset: 5px;
    filter: drop-shadow(0 0 5px rgba(255, 77, 109, 0.4));
    z-index: 200 !important;  /* Asegura que el elemento seleccionado quede por encima */
}

/* Tooltip interactivo (solo al hover) */
.scrap-item::after {
    content: "🔧";
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    background: rgba(0, 0, 0, 0.8);
    color: white;
    padding: 3px 8px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
    font-family: monospace;
    z-index: 300;
}

.scrap-item:hover::after {
    opacity: 0.85;
    content: "✨ Doble clic | ✋ Arrastrar | 🔄 Q/E rotar";
}

/* ===== ANIMACIÓN EXCLUSIVA DEL ARÁNDANO (40s rotación suave) ===== */
.rotate-animation {
    animation: blueberryRotate 40s linear infinite;
}

@keyframes blueberryRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Watermark (créditos) */
.watermark {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.85);
    font-size: 12px;
    font-family: 'Segoe UI', system-ui;
    background: rgba(0, 0, 0, 0.55);
    padding: 5px 15px;
    border-radius: 40px;
    pointer-events: none;
    z-index: 25;
    backdrop-filter: blur(2px);
    white-space: nowrap;
}

/* Ajuste responsivo básico: para que los elementos no se salgan en pantallas pequeñas */
@media (max-width: 768px) {
    .scrap-item::after {
        font-size: 9px;
        top: -24px;
        white-space: nowrap;
    }
    .resize-handle, .rotate-handle {
        transform: scale(0.9);
    }
}
</style>
</head>

<body>

<div class="fullscreen-container">
    <!-- FONDO principal (debe existir en carpeta img/) -->
    <img src="img/fondo.png" class="fullscreen-img" alt="Fondo de página Karla Sherlyn">

    <div class="scrapbook-layer">
        <div class="watermark">
            © 2026 Karla Cruz | YANG´S LAB
        </div>

        <!-- BOTÓN CURRÍCULUM - posiciones fijas relativas al viewport (porcentajes) -->
        <div class="scrap-item" data-type="cv" style="top:75%; left:7%; width:18%; transform:rotate(-2deg);">
            <img src="img/Boton_curriculum.png" alt="Botón currículum vitae">
        </div>

        <!-- BOTÓN CONTÁCTAME -->
        <div class="scrap-item" data-type="contacto" style="top:75%; left:31%; width:18%; transform:rotate(2deg);">
            <img src="img/Boton_contactame.png" alt="Botón contáctame">
        </div>

        <!-- BOTÓN PORTAFOLIO (con z-index ligeramente superior para resaltar) -->
        <div class="scrap-item" data-type="portafolio" style="top:45%; left:41%; width:22%; transform:rotate(1deg); z-index:100;">
            <img src="img/Boton_portafolio.png" alt="Botón portafolio">
        </div>

        <!-- ARÁNDANO CON ROTACIÓN PERPETUA (sin perder funcionalidad de arrastre/rotación manual) -->
        <div class="scrap-item rotate-animation" data-type="deco" style="top:50%; left:12%; width:22%; transform:rotate(4deg); cursor:pointer;">
            <img src="img/Arandanos.png" alt="Arándanos decorativos">
        </div>
    </div>
</div>

<script>
// ============================================================
//  FUNCIONES DE NAVEGACIÓN Y ACCIONES (sin alterar movimientos)
// ============================================================

// Descarga del archivo CV (ruta relativa corregida)
function descargarCV() {
    console.log("📄 Solicitando descarga de CV...");
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    setTimeout(() => {
        document.body.removeChild(link);
    }, 150);
    console.log("✅ Descarga iniciada (docs/Karla_Cruz_CV.pdf)");
}

function irContacto() {
    console.log("📞 Redirigiendo a contacto.html");
    window.location.href = "contacto.html";
}

function irPortafolio() {
    console.log("🎨 Navegando a portafolio/portafolio.html");
    window.location.href = "portafolio/portafolio.html";
}

// ============================================================
//  EDITOR: ARRASTRAR, REDIMENSIONAR, ROTAR (MANUAL)
//  Posiciones guardadas automáticamente SIN perder funcionalidad
// ============================================================

let selectedElement = null;       // elemento actualmente seleccionado
let isDraggingFlag = false;
let isResizingFlag = false;
let isRotatingFlag = false;

// Variables para arrastre
let dragStartX = 0, dragStartY = 0;
let initialLeft = 0, initialTop = 0;

// Variables para redimension
let resizeStartX = 0;
let initialWidth = 0;

// Variables para rotación manual (arrastre con círculo azul)
let rotateStartAngle = 0;
let currentRotationDeg = 0;

// Variable para saber si hubo movimiento real (para guardar solo cuando cambia)
let hasMoved = false;

// ===== GUARDAR TODAS LAS POSICIONES, TAMAÑOS Y ROTACIONES =====
function saveAllPositions() {
    const items = document.querySelectorAll('.scrap-item');
    const layoutData = [];
    items.forEach(el => {
        // Guardamos estilos inline actualizados (top, left, width, transform)
        layoutData.push({
            top: el.style.top,
            left: el.style.left,
            width: el.style.width,
            transform: el.style.transform,
            // También guardamos si tiene la clase rotate-animation (para no perderla en recarga)
            hasPermaRotate: el.classList.contains('rotate-animation')
        });
    });
    localStorage.setItem('karla_layout_v2', JSON.stringify(layoutData));
    console.log("💾 Posiciones, tamaños y rotaciones guardadas exitosamente.");
}

// ===== CARGAR POSICIONES GUARDADAS =====
function loadSavedPositions() {
    const saved = localStorage.getItem('karla_layout_v2');
    if (!saved) {
        console.log("📂 No hay datos previos. Usando posiciones del HTML original.");
        return;
    }
    try {
        const layoutData = JSON.parse(saved);
        const items = document.querySelectorAll('.scrap-item');
        items.forEach((el, idx) => {
            if (layoutData[idx]) {
                const data = layoutData[idx];
                if (data.top) el.style.top = data.top;
                if (data.left) el.style.left = data.left;
                if (data.width) el.style.width = data.width;
                if (data.transform) el.style.transform = data.transform;
                // Conservar animación de arándano si era rotación perpetua, pero sin romper rotación manual
                // Evitamos sobreescribir si ya tiene la clase (debe coexistir)
                if (data.hasPermaRotate && !el.classList.contains('rotate-animation')) {
                    // Solo si originalmente tenía y por alguna razón se perdió, la agregamos nuevamente
                    if (el.querySelector('img') && el.querySelector('img').src.toLowerCase().includes('arandanos')) {
                        el.classList.add('rotate-animation');
                    }
                }
            }
        });
        console.log("📂 Layout restaurado correctamente desde localStorage.");
    } catch(e) {
        console.warn("Error al cargar layout previo:", e);
    }
}

// ===== CREAR MANIJAS (RESIZE Y ROTATE) PARA EL ELEMENTO SELECCIONADO =====
function attachHandles(element) {
    // Remover handles existentes para evitar duplicados
    const oldResize = element.querySelector('.resize-handle');
    const oldRotate = element.querySelector('.rotate-handle');
    if (oldResize) oldResize.remove();
    if (oldRotate) oldRotate.remove();

    // Handle de redimension (rosado)
    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'resize-handle';
    element.appendChild(resizeHandle);
    
    // Handle de rotación (azul)
    const rotateHandle = document.createElement('div');
    rotateHandle.className = 'rotate-handle';
    element.appendChild(rotateHandle);

    // Eventos para redimensionar
    resizeHandle.onmousedown = (e) => {
        e.stopPropagation();
        isResizingFlag = true;
        resizeStartX = e.clientX;
        initialWidth = element.offsetWidth;
        document.onmousemove = onResizeMove;
        document.onmouseup = onStopInteraction;
    };

    // Eventos para rotación manual vía handle azul
    rotateHandle.onmousedown = (e) => {
        e.stopPropagation();
        isRotatingFlag = true;
        const rect = element.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        rotateStartAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * 180 / Math.PI;
        // Obtener rotación actual desde transform
        const transform = element.style.transform;
        const match = transform.match(/rotate\(([-\d.]+)deg\)/);
        currentRotationDeg = match ? parseFloat(match[1]) : 0;
        document.onmousemove = onRotateMove;
        document.onmouseup = onStopInteraction;
    };
}

// Redimensionar
function onResizeMove(e) {
    if (!isResizingFlag || !selectedElement) return;
    let newWidth = Math.max(55, initialWidth + (e.clientX - resizeStartX));
    selectedElement.style.width = newWidth + "px";
    hasMoved = true;
}

// Rotar mediante handle
function onRotateMove(e) {
    if (!isRotatingFlag || !selectedElement) return;
    const rect = selectedElement.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let currentAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * 180 / Math.PI;
    let delta = currentAngle - rotateStartAngle;
    let newRot = currentRotationDeg + delta;
    selectedElement.style.transform = `rotate(${newRot}deg)`;
    hasMoved = true;
}

// ===== ARRASTRAR CON MOUSE =====
function startDragElement(e, element) {
    if (e.target.classList.contains('resize-handle') || e.target.classList.contains('rotate-handle')) return;
    e.preventDefault();
    isDraggingFlag = true;
    selectedElement = element;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    // Obtener valores actuales (parseFloat para trabajar con px)
    initialLeft = parseFloat(element.style.left);
    initialTop = parseFloat(element.style.top);
    hasMoved = false;
    document.onmousemove = onDragMove;
    document.onmouseup = onStopDrag;
}

function onDragMove(e) {
    if (!isDraggingFlag || !selectedElement) return;
    let dx = e.clientX - dragStartX;
    let dy = e.clientY - dragStartY;
    let newLeft = initialLeft + dx;
    let newTop = initialTop + dy;
    selectedElement.style.left = newLeft + "px";
    selectedElement.style.top = newTop + "px";
    hasMoved = true;
}

function onStopDrag() {
    if (isDraggingFlag && hasMoved && selectedElement) {
        saveAllPositions();
    }
    isDraggingFlag = false;
    document.onmousemove = null;
    document.onmouseup = null;
    hasMoved = false;
}

// ===== INTERACCIÓN GENERAL DE FINALIZACIÓN (resize/rotate) =====
function onStopInteraction() {
    if ((isResizingFlag || isRotatingFlag) && hasMoved && selectedElement) {
        saveAllPositions();
    }
    isResizingFlag = false;
    isRotatingFlag = false;
    document.onmousemove = null;
    document.onmouseup = null;
    hasMoved = false;
}

// ===== SELECCIÓN DE ELEMENTO (con doble click manteniendo acciones) =====
function selectElement(element) {
    if (selectedElement === element) return;
    // Quitar selección previa
    if (selectedElement) {
        selectedElement.classList.remove('selected');
        selectedElement.style.outline = 'none';
    }
    selectedElement = element;
    selectedElement.classList.add('selected');
    attachHandles(selectedElement);
}

// ===== ROTACIÓN CON TECLADO Q / E (sin alterar otras funciones) =====
function rotateSelectedWithKeyboard(deltaDeg) {
    if (!selectedElement) return;
    let transform = selectedElement.style.transform || "rotate(0deg)";
    let match = transform.match(/rotate\(([-\d.]+)deg\)/);
    let currentRot = match ? parseFloat(match[1]) : 0;
    let newRot = currentRot + deltaDeg;
    selectedElement.style.transform = `rotate(${newRot}deg)`;
    saveAllPositions();
    console.log(`🔄 Rotación manual: ${newRot}deg`);
}

// ===== ASIGNAR FUNCIONES A LOS BOTONES (DOBLE CLIC EJECUTA ACCIÓN) =====
// Además mantiene la posibilidad de clic simple para seleccionar
function bindButtonsActions() {
    const items = document.querySelectorAll('.scrap-item');
    items.forEach(item => {
        const img = item.querySelector('img');
        if (!img) return;
        const srcLower = img.src.toLowerCase();
        
        // Eliminamos listeners anteriores si los hubiera (clonación virtual, pero seguro)
        // Creamos un manejador de doble clic que no interfiere con arrastre
        let clickTimer = null;
        let doubleClickFlag = false;
        
        // Limpiar cualquier listener previo (solución simple: reemplazar eventos)
        // Removemos listeners antiguos clonando lógica (pero no es necesario si se inicializa una vez)
        // Para garantizar que no se dupliquen, usamos nuevos eventos.
        item.removeEventListener('dblclick', item._dblHandler);
        item.removeEventListener('click', item._clickHandler);
        item.removeEventListener('mousedown', item._mouseDownHandler);
        
        // Manejador de doble click para acciones específicas
        const dblClickHandler = (e) => {
            e.stopPropagation();
            doubleClickFlag = true;
            if (clickTimer) {
                clearTimeout(clickTimer);
                clickTimer = null;
            }
            // Ejecutar acción según tipo de botón
            if (srcLower.includes('boton_curriculum')) {
                descargarCV();
            } else if (srcLower.includes('boton_contactame')) {
                irContacto();
            } else if (srcLower.includes('boton_portafolio')) {
                irPortafolio();
            } else if (srcLower.includes('arandanos')) {
                // Arándano: doble clic puede resetear rotación? o simplemente no acción extra
                console.log("🫐 Arándano decorativo (doble clic sin acción)");
            }
            // Pequeño timeout para resetear flag
            setTimeout(() => { doubleClickFlag = false; }, 100);
        };
        
        // Manejador de click simple (seleccionar)
        const clickHandler = (e) => {
            e.stopPropagation();
            if (doubleClickFlag) {
                doubleClickFlag = false;
                return;
            }
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                selectElement(item);
                clickTimer = null;
            }, 150);
        };
        
        // Manejador de inicio de arrastre
        const mouseDownHandler = (e) => {
            // Evitar que arrastre si se hizo clic en los handles (ya están controlados aparte)
            if (e.target.classList.contains('resize-handle') || e.target.classList.contains('rotate-handle')) return;
            startDragElement(e, item);
        };
        
        item.addEventListener('dblclick', dblClickHandler);
        item.addEventListener('click', clickHandler);
        item.addEventListener('mousedown', mouseDownHandler);
        
        // Guardar referencias para posible limpieza
        item._dblHandler = dblClickHandler;
        item._clickHandler = clickHandler;
        item._mouseDownHandler = mouseDownHandler;
    });
}

// ===== VERIFICAR EXISTENCIA DE IMÁGENES Y RECURSOS (útil para depuración) =====
function checkResources() {
    const allImages = document.querySelectorAll('img');
    allImages.forEach(img => {
        img.onerror = () => {
            console.warn(`⚠️ Imagen no encontrada: ${img.src}`);
            img.style.border = "1px dashed rgba(255,80,80,0.7)";
        };
        img.onload = () => {
            console.log(`✅ Imagen cargada: ${img.src.split('/').pop()}`);
        };
    });
    // Verificar PDF
    fetch('docs/Karla_Cruz_CV.pdf', { method: 'HEAD' })
        .then(resp => resp.ok ? console.log("✅ PDF disponible en docs/Karla_Cruz_CV.pdf") : console.warn("⚠️ PDF no encontrado"))
        .catch(() => console.warn("⚠️ No se pudo verificar el PDF"));
}

// ===== ELIMINAR SELECCIÓN AL HACER CLIC FUERA =====
document.body.addEventListener('click', (e) => {
    if (!e.target.closest('.scrap-item')) {
        if (selectedElement) {
            selectedElement.classList.remove('selected');
            selectedElement.style.outline = 'none';
            selectedElement = null;
        }
    }
});

// ===== TECLADO Q / E para rotar elemento seleccionado =====
window.addEventListener('keydown', (e) => {
    if (!selectedElement) return;
    const key = e.key.toLowerCase();
    if (key === 'q') {
        e.preventDefault();
        rotateSelectedWithKeyboard(-5);
    } else if (key === 'e') {
        e.preventDefault();
        rotateSelectedWithKeyboard(5);
    }
});

// ===== INICIALIZACIÓN COMPLETA =====
window.onload = () => {
    // Cargar posiciones previamente guardadas (si existen)
    loadSavedPositions();
    
    // Asignar comportamientos de botones, doble click, arrastre y selección
    bindButtonsActions();
    
    // Verificar recursos visuales
    checkResources();
    
    // Asegurar que los elementos mantengan su clase de rotación perpetua (Arándano)
    const arandanoItem = document.querySelector('.scrap-item.rotate-animation');
    if (arandanoItem && !arandanoItem.classList.contains('rotate-animation')) {
        arandanoItem.classList.add('rotate-animation');
    }
    
    // Pequeña corrección: si algún elemento no tiene transform inline por defecto, asegurar que coincida con HTML
    document.querySelectorAll('.scrap-item').forEach(el => {
        if (!el.style.transform) {
            const computedRot = getComputedStyle(el).transform;
            if (computedRot === 'none') el.style.transform = 'rotate(0deg)';
        }
    });
    
    console.log("%c✨ EDITOR COMPLETO - POSICIONES FIJAS Y FUNCIONES ACTIVAS ✨", "color:#ff4d6d; font-size:15px; font-weight:bold");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
    console.log("✅ CLIC SIMPLE: selecciona elemento (aparecen asas rosa/azul)");
    console.log("✅ DOBLE CLIC: ejecuta la acción del botón (CV, contacto, portafolio)");
    console.log("✅ ARRASTRAR sobre la imagen: mueve el elemento libremente");
    console.log("✅ CÍRCULO ROSADO: redimensiona ancho");
    console.log("✅ CÍRCULO AZUL: rotación manual");
    console.log("✅ TECLAS Q / E: rotan elemento seleccionado (5° grados)");
    console.log("✅ TODAS las posiciones, tamaños y rotaciones se guardan automáticamente");
    console.log("✅ ARÁNDANO conserva su animación de rotación lenta y además se puede rotar manualmente");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
};
</script>
</body>
</html>
