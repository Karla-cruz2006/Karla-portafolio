<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karla Sherlyn · Curriculum Vitae · Editor Visual</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    overflow-x: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.fullscreen-container {
    position: relative;
    min-height: 100vh;
    width: 100%;
}

.fullscreen-img {
    width: 100%;
    display: block;
    pointer-events: none;
}

.scrapbook-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* ELEMENTOS EDITABLES */
.scrap-item {
    position: absolute;
    cursor: grab;
    user-select: none;
    transform-origin: center center;
    transition: outline 0.05s ease;
}

.scrap-item:active {
    cursor: grabbing;
}

.scrap-item img {
    width: 100%;
    display: block;
    pointer-events: none;
}

/* HANDLES DE EDICIÓN */
.resize-handle {
    position: absolute;
    width: 18px;
    height: 18px;
    background: #ff4d6d;
    border-radius: 50%;
    bottom: -9px;
    right: -9px;
    cursor: nwse-resize;
    border: 2px solid white;
    box-shadow: 0 0 6px rgba(255, 77, 109, 0.6);
    z-index: 100;
    transition: transform 0.1s;
}

.resize-handle:hover {
    transform: scale(1.2);
    background: #ff1e4d;
}

.rotate-handle {
    position: absolute;
    width: 18px;
    height: 18px;
    background: #4d9eff;
    border-radius: 50%;
    top: -9px;
    left: -9px;
    cursor: grab;
    border: 2px solid white;
    box-shadow: 0 0 6px rgba(77, 158, 255, 0.6);
    z-index: 100;
    transition: transform 0.1s;
}

.rotate-handle:hover {
    transform: scale(1.2);
    background: #2b7be6;
}

.rotate-handle:active {
    cursor: grabbing;
}

/* ELEMENTO SELECCIONADO */
.scrap-item.selected {
    outline: 3px solid #ff4d6d;
    outline-offset: 4px;
    filter: drop-shadow(0 0 8px rgba(255, 77, 109, 0.3));
    z-index: 1000 !important;
}

/* Tooltip flotante */
.scrap-item::after {
    content: "✏️";
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    background: rgba(0, 0, 0, 0.85);
    color: white;
    padding: 3px 10px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
    font-family: monospace;
    z-index: 200;
}

.scrap-item:hover::after {
    opacity: 0.9;
    content: "🖱️ Arrastrar | 🔵 Rotar | 🔴 Redimensionar | Q/E girar";
}

/* WATERMARK */
.watermark {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.9);
    font-size: 12px;
    background: rgba(0, 0, 0, 0.6);
    padding: 5px 15px;
    border-radius: 30px;
    pointer-events: none;
    z-index: 20;
    backdrop-filter: blur(3px);
    white-space: nowrap;
}

/* Responsive */
@media (max-width: 768px) {
    .resize-handle, .rotate-handle {
        width: 14px;
        height: 14px;
    }
    .scrap-item::after {
        font-size: 9px;
        top: -25px;
        white-space: nowrap;
    }
}
</style>
</head>

<body>

<div class="fullscreen-container">
    <!-- FONDO -->
    <img src="img/fondo.png" class="fullscreen-img" alt="Fondo Karla Sherlyn">

    <div class="scrapbook-layer">
        <div class="watermark">© 2026 Karla Cruz | YANG´S LAB</div>

        <!-- BOTÓN CURRÍCULUM -->
        <div class="scrap-item" data-type="cv" style="top:75%; left:7%; width:18%; transform:rotate(-2deg);">
            <img src="img/Boton_curriculum.png" alt="Descargar Currículum">
        </div>

        <!-- BOTÓN CONTÁCTAME -->
        <div class="scrap-item" data-type="contacto" style="top:75%; left:31%; width:18%; transform:rotate(2deg);">
            <img src="img/Boton_contactame.png" alt="Contáctame">
        </div>

        <!-- BOTÓN PORTAFOLIO -->
        <div class="scrap-item" data-type="portafolio" style="top:45%; left:41%; width:22%; transform:rotate(1deg); z-index:5;">
            <img src="img/Boton_portafolio.png" alt="Ver Portafolio">
        </div>

        <!-- ARÁNDANO DECORATIVO -->
        <div class="scrap-item" data-type="deco" style="top:50%; left:12%; width:22%; transform:rotate(4deg);">
            <img src="img/Arandanos.png" alt="Arándanos decorativos">
        </div>
    </div>
</div>

<script>
// ============================================================
// FUNCIONES DE NAVEGACIÓN
// ============================================================

// Descarga del archivo CV
function descargarCV() {
    console.log("📄 Descargando CV...");
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    setTimeout(() => document.body.removeChild(link), 150);
    console.log("✅ Descarga iniciada");
}

// Navegación a contacto.html
function irContacto() {
    console.log("📞 Redirigiendo a contactame.html");
    window.location.href = "contactame.html";
}

// Navegación a portafolio
function irPortafolio() {
    console.log("🎨 Navegando a portafolio/portafolio.html");
    window.location.href = "portafolio/portafolio.html";
}

// ============================================================
// EDITOR: MOVER, REDIMENSIONAR, ROTAR
// ============================================================
let selectedElement = null;
let actionMode = null; // 'drag', 'resize', 'rotate'
let startX = 0, startY = 0;
let startLeft = 0, startTop = 0;
let startWidth = 0;
let startRotationAngle = 0;
let currentRotation = 0;

// Obtener rotación actual desde transform
function getRotation(element) {
    const transform = element.style.transform;
    if (!transform) return 0;
    const match = transform.match(/rotate\(([-\d.]+)deg\)/);
    return match ? parseFloat(match[1]) : 0;
}

// Aplicar rotación
function setRotation(element, deg) {
    element.style.transform = `rotate(${deg}deg)`;
}

// ===== CREAR MANIJAS =====
function createHandles(element) {
    // Remover handles existentes
    element.querySelectorAll('.resize-handle, .rotate-handle').forEach(h => h.remove());

    // Handle de redimension (rosado)
    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'resize-handle';
    element.appendChild(resizeHandle);

    // Handle de rotación (azul)
    const rotateHandle = document.createElement('div');
    rotateHandle.className = 'rotate-handle';
    element.appendChild(rotateHandle);

    // Evento redimension
    resizeHandle.onmousedown = (e) => {
        e.stopPropagation();
        actionMode = 'resize';
        startX = e.clientX;
        startWidth = element.offsetWidth;
        e.preventDefault();
    };

    // Evento rotación
    rotateHandle.onmousedown = (e) => {
        e.stopPropagation();
        actionMode = 'rotate';
        
        const rect = element.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        startRotationAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
        currentRotation = getRotation(element);
        
        e.preventDefault();
    };
}

// ===== SELECCIONAR ELEMENTO =====
function selectElement(element) {
    if (selectedElement === element) return;
    
    if (selectedElement) {
        selectedElement.classList.remove('selected');
    }
    
    selectedElement = element;
    selectedElement.classList.add('selected');
    createHandles(selectedElement);
}

// ===== ARRASTRAR =====
function startDrag(element, e) {
    actionMode = 'drag';
    selectedElement = element;
    
    const rect = element.getBoundingClientRect();
    const parentRect = element.parentElement.getBoundingClientRect();
    
    startX = e.clientX;
    startY = e.clientY;
    startLeft = rect.left - parentRect.left;
    startTop = rect.top - parentRect.top;
    
    element.style.left = startLeft + 'px';
    element.style.top = startTop + 'px';
}

// ===== GUARDAR POSICIONES EN LOCALSTORAGE =====
function savePositions() {
    const items = document.querySelectorAll('.scrap-item');
    const data = [];
    items.forEach(el => {
        data.push({
            top: el.style.top,
            left: el.style.left,
            width: el.style.width,
            transform: el.style.transform
        });
    });
    localStorage.setItem('karla_layout', JSON.stringify(data));
    console.log("💾 Posiciones guardadas");
}

// ===== CARGAR POSICIONES =====
function loadPositions() {
    const saved = localStorage.getItem('karla_layout');
    if (!saved) {
        console.log("📂 No hay posiciones guardadas, usando valores por defecto");
        return;
    }
    
    try {
        const data = JSON.parse(saved);
        const items = document.querySelectorAll('.scrap-item');
        items.forEach((el, i) => {
            if (data[i]) {
                if (data[i].top) el.style.top = data[i].top;
                if (data[i].left) el.style.left = data[i].left;
                if (data[i].width) el.style.width = data[i].width;
                if (data[i].transform) el.style.transform = data[i].transform;
            }
        });
        console.log("📂 Posiciones cargadas desde localStorage");
    } catch(e) {
        console.warn("Error al cargar:", e);
    }
}

// ============================================================
// EVENTOS GLOBALES
// ============================================================

// Mouse move
document.onmousemove = (e) => {
    if (!selectedElement) return;
    
    if (actionMode === 'drag') {
        const newLeft = startLeft + (e.clientX - startX);
        const newTop = startTop + (e.clientY - startY);
        selectedElement.style.left = newLeft + 'px';
        selectedElement.style.top = newTop + 'px';
    }
    
    if (actionMode === 'resize') {
        let newWidth = Math.max(60, startWidth + (e.clientX - startX));
        selectedElement.style.width = newWidth + 'px';
    }
    
    if (actionMode === 'rotate') {
        const rect = selectedElement.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const currentAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
        let deltaDeg = (currentAngle - startRotationAngle) * 180 / Math.PI;
        let newRotation = currentRotation + deltaDeg;
        
        setRotation(selectedElement, newRotation);
    }
};

// Mouse up: guardar y limpiar
document.onmouseup = () => {
    if (actionMode && selectedElement) {
        savePositions();
    }
    actionMode = null;
};

// ===== ASIGNAR EVENTOS A CADA ELEMENTO =====
function bindEvents() {
    document.querySelectorAll('.scrap-item').forEach(el => {
        // CLICK: seleccionar elemento
        el.onclick = (e) => {
            e.stopPropagation();
            selectElement(el);
        };
        
        // MOUSEDOWN: iniciar arrastre
        el.onmousedown = (e) => {
            if (e.target.classList.contains('resize-handle') || 
                e.target.classList.contains('rotate-handle')) {
                return;
            }
            startDrag(el, e);
            e.preventDefault();
        };
    });
}

// ===== DOBLE CLIC: EJECUTAR ACCIONES =====
function bindDoubleClickActions() {
    document.querySelectorAll('.scrap-item').forEach(el => {
        el.ondblclick = (e) => {
            e.stopPropagation();
            const img = el.querySelector('img');
            if (!img) return;
            
            const src = img.src.toLowerCase();
            
            if (src.includes('boton_curriculum')) {
                descargarCV();
            } else if (src.includes('boton_contactame')) {
                irContacto();
            } else if (src.includes('boton_portafolio')) {
                irPortafolio();
            } else if (src.includes('arandanos')) {
                console.log("🫐 Arándano decorativo (sin acción)");
            }
        };
    });
}

// ===== ROTACIÓN CON TECLADO (Q / E) =====
document.addEventListener('keydown', (e) => {
    if (!selectedElement) return;
    
    const key = e.key.toLowerCase();
    let rot = getRotation(selectedElement);
    
    if (key === 'q') {
        e.preventDefault();
        rot -= 5;
        setRotation(selectedElement, rot);
        savePositions();
        console.log(`🔄 Rotación: ${rot}°`);
    } else if (key === 'e') {
        e.preventDefault();
        rot += 5;
        setRotation(selectedElement, rot);
        savePositions();
        console.log(`🔄 Rotación: ${rot}°`);
    }
});

// ===== CLICK FUERA: DESELECCIONAR =====
document.body.addEventListener('click', (e) => {
    if (!e.target.closest('.scrap-item')) {
        if (selectedElement) {
            selectedElement.classList.remove('selected');
            selectedElement = null;
        }
    }
});

// ===== VERIFICAR RECURSOS =====
function checkResources() {
    const images = document.querySelectorAll('img');
    images.forEach(img => {
        img.onerror = () => console.warn(`⚠️ Imagen no encontrada: ${img.src}`);
        img.onload = () => console.log(`✅ Imagen: ${img.src.split('/').pop()}`);
    });
    
    fetch('docs/Karla_Cruz_CV.pdf', { method: 'HEAD' })
        .then(res => res.ok ? console.log("✅ PDF disponible") : console.warn("⚠️ PDF no encontrado"))
        .catch(() => console.warn("⚠️ No se pudo verificar PDF"));
}

// ============================================================
// INICIALIZACIÓN
// ============================================================
window.onload = () => {
    // Cargar posiciones guardadas
    loadPositions();
    
    // Asignar eventos de edición
    bindEvents();
    
    // Asignar acciones de doble clic
    bindDoubleClickActions();
    
    // Verificar recursos
    checkResources();
    
    console.log("%c✨ EDITOR ACTIVADO - GUARDA AUTOMÁTICAMENTE ✨", "color: #ff4d6d; font-size: 14px; font-weight: bold");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
    console.log("✅ CLIC: Seleccionar elemento (aparecen handles)");
    console.log("✅ ARRASTRAR: Mover elemento");
    console.log("✅ CÍRCULO ROSADO: Redimensionar");
    console.log("✅ CÍRCULO AZUL: Rotar");
    console.log("✅ TECLAS Q / E: Rotar elemento seleccionado");
    console.log("✅ DOBLE CLIC: Ejecutar acción del botón");
    console.log("✅ Las posiciones se guardan AUTOMÁTICAMENTE");
    console.log("✅ Al recargar, los elementos mantienen su lugar");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
};
</script>

</body>
</html>
