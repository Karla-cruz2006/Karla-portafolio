<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karla Sherlyn · Curriculum Vitae</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    overflow-x: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
}

.fullscreen-container {
    position: relative;
    min-height: 100vh;
    width: 100%;
}

.fullscreen-img {
    width: 100%;
    display: block;
    pointer-events: none;
}

.scrapbook-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* ELEMENTOS - BLOQUEADOS (sin movimiento) */
.scrap-item {
    position: absolute;
    cursor: pointer;  /* Cambiado de grab a pointer */
    user-select: none;
    transform-origin: center center;
    /* Sin transiciones que puedan interferir */
}

.scrap-item img {
    width: 100%;
    display: block;
    pointer-events: none;  /* La imagen no bloquea el clic */
}

/* ===== ANIMACIÓN EXCLUSIVA PARA ARÁNDANOS ===== */
.blueberry-rotate {
    animation: blueberryRotate 40s linear infinite;
    transform-origin: center center;
}

@keyframes blueberryRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* Efecto hover suave (solo visual, sin mover) */
.scrap-item:hover {
    filter: drop-shadow(0 0 8px rgba(255, 255, 200, 0.4));
    transition: filter 0.2s ease;
}

/* Tooltip informativo */
.scrap-item::after {
    content: "✨";
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    background: rgba(0, 0, 0, 0.85);
    color: white;
    padding: 3px 10px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
    font-family: monospace;
    z-index: 200;
}

.scrap-item:hover::after {
    opacity: 0.9;
    content: "✨ Doble clic para accionar ✨";
}

/* Arándano tooltip personalizado */
.scrap-item[data-type="deco"]:hover::after {
    content: "🫐 Arándanos decorativos (rotación automática) 🫐";
}

/* WATERMARK */
.watermark {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.9);
    font-size: 12px;
    background: rgba(0, 0, 0, 0.6);
    padding: 5px 15px;
    border-radius: 30px;
    pointer-events: none;
    z-index: 20;
    backdrop-filter: blur(3px);
    white-space: nowrap;
}

/* Responsive */
@media (max-width: 768px) {
    .scrap-item::after {
        font-size: 9px;
        top: -22px;
        white-space: nowrap;
    }
}
</style>
</head>

<body>

<div class="fullscreen-container">
    <!-- FONDO -->
    <img src="img/fondo.png" class="fullscreen-img" alt="Fondo Karla Sherlyn">

    <div class="scrapbook-layer">
        <div class="watermark">© 2026 Karla Cruz | YANG´S LAB</div>

        <!-- BOTÓN CURRÍCULUM - BLOQUEADO -->
        <div class="scrap-item" data-type="cv" style="top:75%; left:7%; width:18%; transform:rotate(-2deg);">
            <img src="img/Boton_curriculum.png" alt="Descargar Currículum">
        </div>

        <!-- BOTÓN CONTÁCTAME - BLOQUEADO -->
        <div class="scrap-item" data-type="contacto" style="top:75%; left:31%; width:18%; transform:rotate(2deg);">
            <img src="img/Boton_contactame.png" alt="Contáctame">
        </div>

        <!-- BOTÓN PORTAFOLIO - BLOQUEADO -->
        <div class="scrap-item" data-type="portafolio" style="top:45%; left:41%; width:22%; transform:rotate(1deg); z-index:5;">
            <img src="img/Boton_portafolio.png" alt="Ver Portafolio">
        </div>

        <!-- ARÁNDANO DECORATIVO - CON ROTACIÓN AUTOMÁTICA -->
        <div class="scrap-item blueberry-rotate" data-type="deco" style="top:50%; left:12%; width:22%; transform:rotate(4deg);">
            <img src="img/Arandanos.png" alt="Arándanos decorativos">
        </div>
    </div>
</div>

<script>
// ============================================================
// FUNCIONES DE NAVEGACIÓN (COMPATIBLES CON GITHUB PAGES)
// ============================================================

// Descarga del archivo CV
function descargarCV() {
    console.log("📄 Descargando CV...");
    const link = document.createElement('a');
    link.href = "docs/Karla_Cruz_CV.pdf";
    link.download = "Karla_Cruz_CV.pdf";
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    setTimeout(() => document.body.removeChild(link), 150);
    console.log("✅ Descarga iniciada: docs/Karla_Cruz_CV.pdf");
}

// Navegación a contacto.html (funciona en local y GitHub Pages)
function irContacto() {
    console.log("📞 Redirigiendo a contactame.html");
    window.location.href = "contactame.html";
}

// Navegación a portafolio (funciona en local y GitHub Pages)
function irPortafolio() {
    console.log("🎨 Navegando a portafolio/portafolio.html");
    window.location.href = "portafolio/portafolio.html";
}

// ============================================================
// ASIGNAR ACCIONES A LOS BOTONES (SOLO DOBLE CLIC)
// ============================================================
function asignarAcciones() {
    const items = document.querySelectorAll('.scrap-item');
    
    items.forEach(item => {
        const img = item.querySelector('img');
        if (!img) return;
        
        const srcLower = img.src.toLowerCase();
        
        // Asignar evento de doble clic
        item.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            
            if (srcLower.includes('boton_curriculum')) {
                descargarCV();
            } else if (srcLower.includes('boton_contactame')) {
                irContacto();
            } else if (srcLower.includes('boton_portafolio')) {
                irPortafolio();
            } else if (srcLower.includes('arandanos')) {
                console.log("🫐 Arándano decorativo - Rotación automática activa");
                // Opcional: feedback visual
                const rotActual = item.style.transform;
                console.log(`   Rotación actual: ${rotActual}`);
            }
        });
        
        // Prevenir cualquier intento de arrastre
        item.addEventListener('dragstart', (e) => {
            e.preventDefault();
            return false;
        });
        
        // Cursor pointer para indicar que es clickeable
        item.style.cursor = 'pointer';
    });
}

// ============================================================
// VERIFICAR RECURSOS (IMÁGENES Y PDF)
// ============================================================
function verificarRecursos() {
    const imagenes = document.querySelectorAll('img');
    imagenes.forEach(img => {
        img.onerror = () => {
            console.warn(`⚠️ Imagen no encontrada: ${img.src}`);
            img.style.border = "1px dashed rgba(255,80,80,0.6)";
        };
        img.onload = () => {
            console.log(`✅ Imagen cargada: ${img.src.split('/').pop()}`);
        };
    });
    
    // Verificar PDF
    fetch('docs/Karla_Cruz_CV.pdf', { method: 'HEAD' })
        .then(resp => {
            if (resp.ok) {
                console.log("✅ PDF disponible en docs/Karla_Cruz_CV.pdf");
            } else {
                console.warn("⚠️ PDF no encontrado en docs/Karla_Cruz_CV.pdf");
            }
        })
        .catch(() => console.warn("⚠️ No se pudo verificar el PDF"));
}

// ============================================================
// ASEGURAR ANIMACIÓN DEL ARÁNDANO
// ============================================================
function asegurarAnimacionArandano() {
    const arandano = document.querySelector('.scrap-item[data-type="deco"]');
    if (arandano && !arandano.classList.contains('blueberry-rotate')) {
        arandano.classList.add('blueberry-rotate');
        console.log("🫐 Animación del arándano asegurada");
    }
}

// ============================================================
// INICIALIZACIÓN
// ============================================================
window.onload = () => {
    // Asignar acciones a los botones
    asignarAcciones();
    
    // Verificar imágenes y recursos
    verificarRecursos();
    
    // Asegurar animación del arándano
    asegurarAnimacionArandano();
    
    console.log("%c✨ ELEMENTOS BLOQUEADOS - SOLO FUNCIONES ACTIVAS ✨", "color: #ff4d6d; font-size: 14px; font-weight: bold");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
    console.log("🔒 Los elementos NO se pueden mover, redimensionar ni rotar manualmente");
    console.log("✅ DOBLE CLIC en botones para ejecutar acciones:");
    console.log("   📄 Currículum → descarga PDF");
    console.log("   📞 Contáctame → redirige a contactame.html");
    console.log("   🎨 Portafolio → redirige a portafolio/portafolio.html");
    console.log("🫐 Arándano → Rotación automática (40 segundos)");
    console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
};
</script>

</body>
</html>
