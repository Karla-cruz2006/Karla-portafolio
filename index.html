<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karla Sherlyn · Curriculum Vitae</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    overflow-x:hidden;
}

.fullscreen-container{
    position:relative;
    min-height:100vh;
}

.fullscreen-img{
    width:100%;
    display:block;
    pointer-events:none;
}

.scrapbook-layer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

/* ELEMENTOS */
.scrap-item{
    position:absolute;
    cursor:grab;
    user-select:none;
    transform-origin:center center;
}

.scrap-item img{
    width:100%;
    display:block;
    pointer-events:none;
}

/* HANDLES */
.resize-handle{
    position:absolute;
    width:14px;
    height:14px;
    background:#ff4d6d;
    border-radius:50%;
    bottom:-7px;
    right:-7px;
    cursor:nwse-resize;
    border:2px solid white;
}

.rotate-handle{
    position:absolute;
    width:14px;
    height:14px;
    background:#4d9eff;
    border-radius:50%;
    top:-7px;
    left:-7px;
    cursor:grab;
    border:2px solid white;
}

/* WATERMARK */
.watermark{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:12px;
    background:rgba(0,0,0,0.5);
    padding:5px 12px;
    border-radius:20px;
}

/* SELECTED */
.selected{
    outline:3px solid #ff4d6d;
}
</style>
</head>

<body>

<div class="fullscreen-container">
<img src="img/fondo.png" class="fullscreen-img">

<div class="scrapbook-layer">

<div class="watermark">© 2026 Karla Cruz | YANG´S LAB</div>

<div class="scrap-item" style="top:75%;left:7%;width:18%;">
<img src="img/Boton_curriculum.png">
</div>

<div class="scrap-item" style="top:75%;left:31%;width:18%;">
<img src="img/Boton_contactame.png">
</div>

<div class="scrap-item" style="top:45%;left:41%;width:22%;">
<img src="img/Boton_portafolio.png">
</div>

<div class="scrap-item" style="top:50%;left:12%;width:22%;">
<img src="img/Arandanos.png">
</div>

</div>
</div>

<script>

let selected=null;
let mode=null;
let startX,startY,startLeft,startTop,startW,startRot;

/* ROTACIÓN */
function getRot(el){
    return parseFloat(el.dataset.rot || 0);
}

function setTransform(el){
    el.style.transform = `rotate(${getRot(el)}deg)`;
}

/* HANDLES */
function addHandles(el){

    el.querySelectorAll(".resize-handle,.rotate-handle").forEach(e=>e.remove());

    const r=document.createElement("div");
    r.className="resize-handle";

    const rot=document.createElement("div");
    rot.className="rotate-handle";

    el.appendChild(r);
    el.appendChild(rot);

    r.onmousedown=(e)=>{
        e.stopPropagation();
        mode="resize";
        selected=el;
        startX=e.clientX;
        startW=el.offsetWidth;
    };

    rot.onmousedown=(e)=>{
        e.stopPropagation();
        mode="rotate";
        selected=el;

        const rect=el.getBoundingClientRect();
        const cx=rect.left+rect.width/2;
        const cy=rect.top+rect.height/2;

        startX=Math.atan2(e.clientY-cy,e.clientX-cx);
        startRot=getRot(el);
    };
}

/* DRAG FIX DEFINITIVO */
document.querySelectorAll(".scrap-item").forEach(el=>{

    el.onmousedown=(e)=>{

        if(e.target.classList.contains("resize-handle") ||
           e.target.classList.contains("rotate-handle")) return;

        selected=el;
        addHandles(el);

        mode="drag";

        const rect = el.getBoundingClientRect();
        const parentRect = el.parentElement.getBoundingClientRect();

        startX=e.clientX;
        startY=e.clientY;

        // 🔥 FIX REAL: siempre trabajar en px
        startLeft = rect.left - parentRect.left;
        startTop = rect.top - parentRect.top;

        el.style.left = startLeft + "px";
        el.style.top = startTop + "px";

        e.preventDefault();
    };

    el.onclick=()=>{ selected=el; };
});

/* MOVE SYSTEM */
document.onmousemove=(e)=>{
    if(!selected) return;

    if(mode==="drag"){
        selected.style.left = (startLeft + (e.clientX-startX)) + "px";
        selected.style.top  = (startTop + (e.clientY-startY)) + "px";
    }

    if(mode==="resize"){
        let w=Math.max(60,startW+(e.clientX-startX));
        selected.style.width=w+"px";
    }

    if(mode==="rotate"){
        const rect=selected.getBoundingClientRect();
        const cx=rect.left+rect.width/2;
        const cy=rect.top+rect.height/2;

        let ang=Math.atan2(e.clientY-cy,e.clientX-cx);
        let deg=(ang-startX)*180/Math.PI;

        selected.dataset.rot=startRot+deg;
        setTransform(selected);
    }
};

document.onmouseup=()=>{
    mode=null;
    selected=null;
};

/* TECLAS */
document.addEventListener("keydown",(e)=>{
    if(!selected) return;

    let rot=getRot(selected);

    if(e.key==="q") selected.dataset.rot=rot-5;
    if(e.key==="e") selected.dataset.rot=rot+5;

    setTransform(selected);
});

</script>

</body>
</html>
