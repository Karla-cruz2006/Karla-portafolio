<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio - Pósters</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

/* ===== FONDO ===== */
body {
    background-image: url("../img/fondo-secciones.png");
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center top;
    background-color: #000;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
}

/* ===== CONTENEDOR ===== */
.contenedor-libre {
    position: relative;
    width: 100%;
    min-height: 100vh;
}

/* ===== BARRA BOTONES (NUEVO) ===== */
.barra-botones {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    padding: 10px 15px;
    border-radius: 50px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 10000;
}

/* BOTONES */
.boton-movible {
    padding: 12px 22px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    cursor: grab;
    transition: .3s;
    white-space: nowrap;
}

.boton-movible:active {
    cursor: grabbing;
}

/* COLORES */
.btn-inicio { background:#4CAF50; color:white; }
.btn-regreso { background:#ff9800; color:white; }
.btn-siguiente { background:#2196F3; color:white; }

/* HOVER */
.boton-movible:hover {
    transform: scale(1.08);
}

/* ===== CARRUSEL (NO TOCADO) ===== */
.carrusel-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    max-width: 85vw;
    z-index: 9999;
}
</style>
</head>

<body>

<div class="contenedor-libre">

    <!-- ===== BOTONES ===== -->
    <div class="barra-botones">

        <a href="../index.html" class="boton-movible btn-inicio" id="btnInicio">
            🏠 Inicio
        </a>

        <button class="boton-movible btn-regreso" id="btnRegreso">
            ◀ Regreso
        </button>

        <button class="boton-movible btn-siguiente" id="btnSiguiente">
            Siguiente ▶
        </button>

    </div>

</div>
