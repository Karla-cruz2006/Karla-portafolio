<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Pósters</title>
    
    <!-- ✅ ANTI-CACHÉ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* ✅ Fondo corregido */
        body {
            background-image: url("../img/fondo-secciones.png");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center top;
            background-attachment: scroll;
            background-color: #000;
            min-height: 100vh;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        .contenedor-libre {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }

        .boton-movible {
            position: absolute;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: grab;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 1000;
            white-space: nowrap;
            transform-origin: center center;
        }

        .boton-movible:active {
            cursor: grabbing;
        }

        .boton-movible:focus {
            outline: 3px solid yellow;
            outline-offset: 3px;
        }

        .btn-inicio {
            background-color: #4CAF50;
            color: white;
            top: 100px;
            left: 100px;
        }

        .btn-inicio:hover {
            background-color: #45a049;
        }

        .btn-regreso {
            background-color: #ff9800;
            color: white;
            top: 100px;
            left: 300px;
        }

        .btn-regreso:hover {
            background-color: #e68900;
        }

        .btn-siguiente {
            background-color: #2196F3;
            color: white;
            top: 100px;
            left: 500px;
        }

        .btn-siguiente:hover {
            background-color: #0b7dda;
        }

        /* ========== CARRUSEL CENTRAL ========== */
        .carrusel-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            max-width: 85vw;
            z-index: 99999;
        }

        .carrusel {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .carrusel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            gap: 20px;
        }

        .carrusel-item {
            min-width: 100%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carrusel-item img {
            width: auto;
            max-width: 90%;
            max-height: 450px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .carrusel-item img:hover {
            transform: scale(1.02);
        }

        /* Botones del carrusel */
        .carrusel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #FFD700;
            border: 2px solid rgba(255, 215, 0, 0.5);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.2s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carrusel-btn:hover {
            background: rgba(255, 215, 0, 0.9);
            color: black;
            transform: translateY(-50%) scale(1.1);
        }

        .carrusel-prev {
            left: 5px;
        }

        .carrusel-next {
            right: 5px;
        }

        /* Indicadores */
        .carrusel-indicadores {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .indicador {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .indicador.activo {
            background: #FFD700;
            width: 25px;
            border-radius: 5px;
        }

        .indicador:hover {
            background: rgba(255, 215, 0, 0.8);
            transform: scale(1.2);
        }

        /* Título */
        .carrusel-titulo {
            text-align: center;
            color: #FFD700;
            font-size: 20px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .carrusel-container {
                width: 90%;
            }
            .carrusel-item img {
                max-height: 350px;
            }
            .carrusel-btn {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }
            .carrusel-titulo {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor-libre">
        <!-- ✅ Ruta relativa corregida -->
        <a href="../index.html" 
           class="boton-movible btn-inicio" 
           id="btnInicio"
           tabindex="0">
            🏠 Inicio
        </a>

        <button class="boton-movible btn-regreso" id="btnRegreso" tabindex="0">
            ◀ Regreso
        </button>

        <button class="boton-movible btn-siguiente" id="btnSiguiente" tabindex="0">
            Siguiente ▶
        </button>
    </div>

    <!-- ========== CARRUSEL ========== -->
    <div class="carrusel-container">
        <div class="carrusel-titulo">
            ✨ PÓSTERS ✨
        </div>
        <div class="carrusel">
            <button class="carrusel-btn carrusel-prev" id="btnPrev">‹</button>
            <div class="carrusel-track" id="carruselTrack">
                <!-- Elemento 1 -->
                <div class="carrusel-item">
                    <img src="../img/Póster-Moto.png" alt="Póster Moto" onerror="this.src='https://via.placeholder.com/500x400?text=Póster+Moto'">
                </div>
                <!-- Elemento 2 -->
                <div class="carrusel-item">
                    <img src="../img/Póster-Primavera.png" alt="Póster Primavera" onerror="this.src='https://via.placeholder.com/500x400?text=Póster+Primavera'">
                </div>
                <!-- Elemento 3 -->
                <div class="carrusel-item">
                    <img src="../img/Póster-TDD.png" alt="Póster TDD" onerror="this.src='https://via.placeholder.com/500x400?text=Póster+TDD'">
                </div>
            </div>
            <button class="carrusel-btn carrusel-next" id="btnNext">›</button>
        </div>
        <div class="carrusel-indicadores" id="indicadores"></div>
    </div>

    <script>
        // ========== CARRUSEL ==========
        const track = document.getElementById('carruselTrack');
        const items = document.querySelectorAll('.carrusel-item');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const contenedorIndicadores = document.getElementById('indicadores');
        
        let currentIndex = 0;
        const totalItems = items.length;

        // ✅ Crear indicadores dinámicamente
        function crearIndicadores() {
            if (!contenedorIndicadores) return;
            contenedorIndicadores.innerHTML = '';
            for (let i = 0; i < totalItems; i++) {
                const indicador = document.createElement('div');
                indicador.classList.add('indicador');
                if (i === 0) indicador.classList.add('activo');
                indicador.addEventListener('click', () => {
                    currentIndex = i;
                    actualizarCarrusel();
                });
                contenedorIndicadores.appendChild(indicador);
            }
        }

        function actualizarCarrusel() {
            const desplazamiento = currentIndex * 100;
            track.style.transform = `translateX(-${desplazamiento}%)`;
            const indicadores = document.querySelectorAll('.indicador');
            indicadores.forEach((ind, idx) => {
                if (idx === currentIndex) ind.classList.add('activo');
                else ind.classList.remove('activo');
            });
        }

        function siguienteSlide() {
            currentIndex = (currentIndex + 1) % totalItems;
            actualizarCarrusel();
        }

        function anteriorSlide() {
            currentIndex = (currentIndex - 1 + totalItems) % totalItems;
            actualizarCarrusel();
        }

        if (btnNext) btnNext.addEventListener('click', siguienteSlide);
        if (btnPrev) btnPrev.addEventListener('click', anteriorSlide);

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') anteriorSlide();
            else if (e.key === 'ArrowRight') siguienteSlide();
        });

        // ========== CÓDIGO DE BOTONES MOVIBLES ==========
        let botonSeleccionado = null;

        function makeFullyDraggableAndRotatable(elemento) {
            let startX = 0, startY = 0;
            let startLeft = 0, startTop = 0;
            let startRotate = 0;
            let isDragging = false;
            let isRotating = false;

            const id = elemento.id;
            const savedLeft = localStorage.getItem(`${id}_left`);
            const savedTop = localStorage.getItem(`${id}_top`);
            const savedRotate = localStorage.getItem(`${id}_rotate`);
            const savedScale = localStorage.getItem(`${id}_scale`);
            
            if (savedLeft !== null && savedTop !== null) {
                elemento.style.left = savedLeft + 'px';
                elemento.style.top = savedTop + 'px';
            }
            
            if (savedRotate !== null) {
                elemento.style.transform = `rotate(${savedRotate}deg) scale(${savedScale || 1})`;
            } else if (savedScale !== null) {
                elemento.style.transform = `scale(${savedScale})`;
            }

            function getCurrentRotation() {
                const transform = elemento.style.transform;
                if (transform && transform.includes('rotate')) {
                    const match = transform.match(/rotate\(([-\d.]+)deg\)/);
                    if (match) return parseFloat(match[1]);
                }
                return 0;
            }

            function getCurrentScale() {
                const transform = elemento.style.transform;
                if (transform && transform.includes('scale')) {
                    const match = transform.match(/scale\(([\d.]+)\)/);
                    if (match) return parseFloat(match[1]);
                }
                return 1;
            }

            function setScale(nuevaEscala) {
                const currentRotate = getCurrentRotation();
                if (currentRotate !== 0) {
                    elemento.style.transform = `rotate(${currentRotate}deg) scale(${nuevaEscala})`;
                } else {
                    elemento.style.transform = `scale(${nuevaEscala})`;
                }
                localStorage.setItem(`${elemento.id}_scale`, nuevaEscala);
            }

            elemento.addEventListener('focus', () => {
                botonSeleccionado = elemento;
            });

            elemento.addEventListener('keydown', (e) => {
                let currentScale = getCurrentScale();
                
                if (e.key === '+' || e.key === '=' || e.key === ']') {
                    e.preventDefault();
                    currentScale = Math.min(3, currentScale * 1.1);
                    setScale(currentScale);
                } else if (e.key === '-' || e.key === '_' || e.key === '[') {
                    e.preventDefault();
                    currentScale = Math.max(0.5, currentScale * 0.9);
                    setScale(currentScale);
                }
            });

            elemento.addEventListener('mousedown', (e) => {
                if (elemento.tagName === 'A') {
                    e.preventDefault();
                }
                
                const usarRotacion = e.ctrlKey;
                
                startX = e.clientX;
                startY = e.clientY;
                
                if (usarRotacion) {
                    isRotating = true;
                    startRotate = getCurrentRotation();
                    elemento.style.cursor = 'grabbing';
                } else {
                    isDragging = true;
                    startLeft = parseFloat(getComputedStyle(elemento).left);
                    startTop = parseFloat(getComputedStyle(elemento).top);
                    elemento.style.cursor = 'grabbing';
                }
                
                e.stopPropagation();
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    
                    let newLeft = startLeft + dx;
                    let newTop = startTop + dy;
                    
                    elemento.style.left = newLeft + 'px';
                    elemento.style.top = newTop + 'px';
                    
                } else if (isRotating) {
                    const dy = e.clientY - startY;
                    const currentScale = getCurrentScale();
                    const newRotate = startRotate + (dy * 0.5);
                    elemento.style.transform = `rotate(${newRotate}deg) scale(${currentScale})`;
                }
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    elemento.style.cursor = 'grab';
                    
                    const left = parseFloat(getComputedStyle(elemento).left);
                    const top = parseFloat(getComputedStyle(elemento).top);
                    localStorage.setItem(`${elemento.id}_left`, left);
                    localStorage.setItem(`${elemento.id}_top`, top);
                    
                } else if (isRotating) {
                    isRotating = false;
                    elemento.style.cursor = 'grab';
                    
                    const rotate = getCurrentRotation();
                    localStorage.setItem(`${elemento.id}_rotate`, rotate);
                }
            });
        }

        const btnInicioMov = document.getElementById('btnInicio');
        const btnRegresoMov = document.getElementById('btnRegreso');
        const btnSiguienteMov = document.getElementById('btnSiguiente');
        
        if (btnInicioMov) makeFullyDraggableAndRotatable(btnInicioMov);
        if (btnRegresoMov) makeFullyDraggableAndRotatable(btnRegresoMov);
        if (btnSiguienteMov) makeFullyDraggableAndRotatable(btnSiguienteMov);

        function expandirConRueda(event) {
            const boton = event.target.closest('.boton-movible');
            if (!boton) return;
            
            event.preventDefault();
            
            let currentScale = 1;
            let currentRotate = 0;
            const transform = boton.style.transform;
            
            if (transform && transform.includes('scale')) {
                const matchScale = transform.match(/scale\(([\d.]+)\)/);
                if (matchScale) currentScale = parseFloat(matchScale[1]);
            }
            
            if (transform && transform.includes('rotate')) {
                const matchRotate = transform.match(/rotate\(([-\d.]+)deg\)/);
                if (matchRotate) currentRotate = parseFloat(matchRotate[1]);
            }
            
            if (event.deltaY < 0) {
                currentScale *= 1.1;
            } else {
                currentScale *= 0.9;
            }
            
            currentScale = Math.max(0.5, Math.min(3, currentScale));
            
            if (currentRotate !== 0) {
                boton.style.transform = `rotate(${currentRotate}deg) scale(${currentScale})`;
            } else {
                boton.style.transform = `scale(${currentScale})`;
            }
            
            localStorage.setItem(`${boton.id}_scale`, currentScale);
        }

        document.querySelectorAll('.boton-movible').forEach(boton => {
            boton.addEventListener('wheel', expandirConRueda, { passive: false });
        });

        // ========== FUNCIÓN PARA BOTONES ==========
        function setupButtonAction(btn, action) {
            if (!btn) return;
            
            let hasMoved = false;
            let startX = 0, startY = 0;
            
            btn.addEventListener('mousedown', (e) => {
                hasMoved = false;
                startX = e.clientX;
                startY = e.clientY;
            });
            
            btn.addEventListener('mousemove', (e) => {
                if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
                    hasMoved = true;
                }
            });
            
            btn.addEventListener('click', (e) => {
                if (hasMoved) {
                    e.preventDefault();
                    return;
                }
                action(e);
            });
        }

        // ✅ RUTAS RELATIVAS CORREGIDAS
        if (btnRegresoMov) {
            setupButtonAction(btnRegresoMov, () => {
                window.location.href = 'infografia.html';
            });
        }
        
        if (btnSiguienteMov) {
            setupButtonAction(btnSiguienteMov, () => {
                window.location.href = 'logos.html';
            });
        }
        
        if (btnInicioMov) {
            setupButtonAction(btnInicioMov, (e) => {
                window.location.href = btnInicioMov.href;
            });
        }

        // ========== VERIFICAR IMÁGENES ==========
        function verificarImagenes() {
            const imagenes = document.querySelectorAll('.carrusel-item img');
            imagenes.forEach(img => {
                img.addEventListener('error', () => {
                    console.warn(`⚠️ Imagen no encontrada: ${img.src}`);
                });
                img.addEventListener('load', () => {
                    console.log(`✅ Imagen cargada: ${img.src.split('/').pop()}`);
                });
            });
        }

        // ========== INICIALIZAR ==========
        crearIndicadores();
        actualizarCarrusel();
        verificarImagenes();
        
        if (btnInicioMov) btnInicioMov.focus();
        
        console.log("%c🎨 Pósters - Carrusel", "color: #FFD700; font-size: 14px; font-weight: bold");
        console.log("✅ Correcciones aplicadas:");
        console.log("   - Rutas relativas (funciona en GitHub Pages)");
        console.log("   - background-size: cover (sin espacios negros)");
        console.log("   - Meta etiquetas anti-caché");
        console.log("   - Indicadores dinámicos");
        console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
        console.log(`📊 Total de pósters: ${totalItems}`);
    </script>
</body>
</html>
