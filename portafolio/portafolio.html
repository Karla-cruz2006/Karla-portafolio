<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio - Carrusel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* 🔥 FONDO ARREGLADO */
body{
    background:url("../img/fondo-portafolio.png") no-repeat center top;
    background-size:cover;
    background-color:#000;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}

/* CONTENEDOR */
.carrusel-container{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    padding:2rem;
    position:relative;

    /* 🔥 POSICIÓN CORREGIDA */
    top:35vh;
}

.carrusel{
    overflow:hidden;
    border-radius:1.5rem;
}

.carrusel-pista{
    display:flex;
    transition:transform .6s ease;
}

.carrusel-item{
    min-width:25%;
    padding:1rem;
}

/* TARJETAS */
.tarjeta{
    background:rgba(0,0,0,.7);
    border-radius:1.5rem;
    padding:2rem 1rem;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    border:1px solid rgba(138,6,105,.6);
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.tarjeta:hover{
    transform:translateY(-10px) scale(1.03);
}

/* IMÁGENES */
.tarjeta-imagen{
    width:80px;
    height:80px;
    object-fit:contain;
    margin-bottom:1rem;
}

.tarjeta h3{
    color:white;
}

/* BOTONES */
.controles{
    display:flex;
    justify-content:center;
    gap:1rem;
    margin-top:2rem;
}

button{
    background:rgba(99,5,70,.4);
    color:white;
    border:none;
    padding:.8rem 1.5rem;
    border-radius:40px;
    cursor:pointer;
}

button:hover{
    background:#7a0260;
}

/* INDICADORES */
.indicadores{
    display:flex;
    justify-content:center;
    gap:.5rem;
    margin-top:1rem;
}

.punto{
    width:10px;
    height:10px;
    background:#fff5;
    border-radius:50%;
}

.punto.activo{
    background:#ff2ca0;
    width:25px;
    border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:900px){
    .carrusel-item{min-width:33%;}
}

@media(max-width:600px){
    .carrusel-item{min-width:50%;}
}

@media(max-width:400px){
    .carrusel-item{min-width:100%;}
}
</style>
</head>

<body>

<div class="carrusel-container">

<div class="carrusel">
<div class="carrusel-pista" id="pista">

<!-- ITEMS -->
<div class="carrusel-item">
<a href="branding.html" class="tarjeta">
<img src="../img/c-branding.png" class="tarjeta-imagen" loading="lazy">
<h3>Branding</h3>
</a>
</div>

<div class="carrusel-item">
<a href="flyers.html" class="tarjeta">
<img src="../img/c-flyers.png" class="tarjeta-imagen" loading="lazy">
<h3>Flyers</h3>
</a>
</div>

<div class="carrusel-item">
<a href="ilustraciones.html" class="tarjeta">
<img src="../img/c-ilustraciones.png" class="tarjeta-imagen" loading="lazy">
<h3>Ilustraciones</h3>
</a>
</div>

<div class="carrusel-item">
<a href="infografia.html" class="tarjeta">
<img src="../img/c-infografias.png" class="tarjeta-imagen" loading="lazy">
<h3>Infografías</h3>
</a>
</div>

<div class="carrusel-item">
<a href="posters.html" class="tarjeta">
<img src="../img/c-posters.png" class="tarjeta-imagen" loading="lazy">
<h3>Pósters</h3>
</a>
</div>

<div class="carrusel-item">
<a href="logos.html" class="tarjeta">
<img src="../img/c-logos.png" class="tarjeta-imagen" loading="lazy">
<h3>Logos</h3>
</a>
</div>

<div class="carrusel-item">
<a href="modelado.html" class="tarjeta">
<img src="../img/c-modelados.png" class="tarjeta-imagen" loading="lazy">
<h3>Modelado</h3>
</a>
</div>

</div>
</div>

<div class="controles">
<button onclick="anterior()">◀</button>
<button onclick="siguiente()">▶</button>
</div>

<div class="indicadores" id="indicadores"></div>

</div>

<script>
const pista=document.getElementById('pista');
const items=document.querySelectorAll('.carrusel-item');
let index=0;

function actualizar(){
    pista.style.transform=`translateX(-${index*25}%)`;
}

function siguiente(){
    index=(index+1)%items.length;
    actualizar();
}

function anterior(){
    index=(index-1+items.length)%items.length;
    actualizar();
}
</script>

</body>
</html>
