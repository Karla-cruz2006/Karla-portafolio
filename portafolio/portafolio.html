<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Portafolio - Carrusel de Secciones</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Contenedor con fondo - BAJADO MÁS ABAJO */
        .fondo-expandido {
            background-image: url("../img/fondo-portafolio.png");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center 15%; /* 🔽 BAJADO: antes estaba en 'center center', ahora en 15% */
            background-attachment: scroll;
            width: 100%;
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Contenedor del carrusel - TOTALMENTE RESPONSIVE */
        .carrusel-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: clamp(1rem, 5vw, 3rem);
            border-radius: clamp(1rem, 3vw, 2rem);
            position: relative;
            margin-top: clamp(2rem, 10vh, 8rem);
            z-index: 10;
        }

        .carrusel {
            width: 100%;
            overflow: hidden;
            border-radius: clamp(1rem, 2vw, 1.5rem);
            position: relative;
        }

        .carrusel-pista {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .carrusel-item {
            flex: 0 0 auto;
            padding: clamp(0.5rem, 2vw, 1rem);
            box-sizing: border-box;
        }

        .tarjeta {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border-radius: clamp(1rem, 3vw, 1.5rem);
            padding: clamp(1rem, 3vw, 2rem) clamp(0.8rem, 2vw, 1rem);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(138, 6, 105, 0.685);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: clamp(150px, 25vh, 200px);
            height: 100%;
        }

        .tarjeta:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(0, 0, 0, 0.85);
            border-color: #860b7caf;
        }

        .tarjeta:active {
            transform: scale(0.98);
        }

        .tarjeta-contenido {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .tarjeta-imagen {
            width: clamp(50px, 10vw, 80px);
            height: clamp(50px, 10vw, 80px);
            object-fit: contain;
            margin-bottom: clamp(0.5rem, 2vw, 1rem);
        }

        .tarjeta h3 {
            color: white;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .controles {
            display: flex;
            justify-content: center;
            gap: clamp(0.5rem, 2vw, 1rem);
            margin-top: clamp(1.5rem, 5vh, 2rem);
            flex-wrap: wrap;
        }

        button {
            background: rgba(99, 5, 70, 0.432);
            color: white;
            border: none;
            padding: clamp(0.6rem, 2vw, 0.8rem) clamp(1rem, 4vw, 1.8rem);
            border-radius: 40px;
            cursor: pointer;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            font-weight: 600;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            min-width: clamp(80px, 20vw, 120px);
        }

        button:hover {
            background: #7a0260d2;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .indicadores {
            display: flex;
            justify-content: center;
            gap: clamp(0.5rem, 2vw, 0.8rem);
            margin-top: clamp(1rem, 4vh, 1.5rem);
            flex-wrap: wrap;
        }

        .punto {
            width: clamp(8px, 2.5vw, 10px);
            height: clamp(8px, 2.5vw, 10px);
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .punto.activo {
            background: #880250b4;
            width: clamp(20px, 6vw, 25px);
            border-radius: 10px;
        }

        .auto-status {
            text-align: center;
            margin-top: clamp(0.8rem, 3vh, 1rem);
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.7rem, 3vw, 0.8rem);
        }

        /* ========== MEDIA QUERIES RESPONSIVE CON AJUSTE DE FONDO ========== */
        
        @media (max-width: 1024px) {
            .carrusel-container {
                margin-top: clamp(1rem, 8vh, 6rem);
            }
            /* En tablets, bajar un poco más el fondo */
            .fondo-expandido {
                background-position: center 12%;
            }
        }

        @media (max-width: 768px) {
            .carrusel-item {
                min-width: 33.333%;
            }
            .tarjeta {
                padding: 1rem;
                min-height: 160px;
            }
            button {
                padding: 0.6rem 1.2rem;
            }
            .fondo-expandido {
                background-position: center 10%;
            }
        }

        @media (max-width: 600px) {
            .carrusel-item {
                min-width: 50%;
            }
            .carrusel-container {
                padding: 1rem;
                margin-top: clamp(1rem, 5vh, 3rem);
            }
            .tarjeta {
                min-height: 140px;
                padding: 0.8rem;
            }
            .controles {
                gap: 0.5rem;
            }
            button {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
                min-width: 70px;
            }
            .fondo-expandido {
                background-position: center 8%;
            }
        }

        @media (max-width: 480px) {
            .carrusel-item {
                min-width: 100%;
            }
            .carrusel-container {
                margin-top: clamp(1rem, 3vh, 2rem);
                padding: 0.8rem;
            }
            .tarjeta {
                min-height: 120px;
                flex-direction: row;
                padding: 0.8rem;
            }
            .tarjeta-contenido {
                flex-direction: row;
                gap: 1rem;
            }
            .tarjeta-imagen {
                width: 50px;
                height: 50px;
                margin-bottom: 0;
            }
            .tarjeta h3 {
                font-size: 1rem;
            }
            .controles {
                flex-wrap: wrap;
            }
            button {
                padding: 0.5rem 0.8rem;
                font-size: 0.7rem;
                min-width: 60px;
            }
            .indicadores {
                gap: 0.5rem;
            }
            .fondo-expandido {
                background-position: center 5%; /* Más abajo en móviles */
            }
        }

        @media (max-width: 900px) and (orientation: landscape) {
            .carrusel-container {
                margin-top: 1rem;
            }
            .tarjeta {
                min-height: 100px;
                padding: 0.5rem;
            }
            .tarjeta-imagen {
                width: 40px;
                height: 40px;
            }
            .tarjeta h3 {
                font-size: 0.8rem;
            }
            button {
                padding: 0.3rem 0.8rem;
                font-size: 0.7rem;
            }
            .fondo-expandido {
                background-position: center 20%; /* En landscape, más abajo */
            }
        }

        @media (min-width: 1920px) {
            .carrusel-container {
                max-width: 1600px;
            }
            .tarjeta-imagen {
                width: 100px;
                height: 100px;
            }
            .tarjeta h3 {
                font-size: 1.5rem;
            }
            button {
                padding: 1rem 2.5rem;
                font-size: 1.2rem;
            }
            .fondo-expandido {
                background-position: center 20%; /* En 4K, más abajo */
            }
        }

        @supports (padding: max(0px)) {
            .carrusel-container {
                padding-left: max(1rem, env(safe-area-inset-left));
                padding-right: max(1rem, env(safe-area-inset-right));
            }
        }

        .carrusel-item {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tarjeta-imagen.error {
            outline: 2px solid red;
            opacity: 0.5;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="fondo-expandido">
        <div class="carrusel-container">
            <div class="carrusel">
                <div class="carrusel-pista" id="pista">
                    <div class="carrusel-item">
                        <a href="branding.html" class="tarjeta">
                            <div class="tarjeta-contenido">
                                <img src="../img/c-branding.png" alt="Branding" class="tarjeta-imagen" loading="lazy">
                                <h3>Branding</h3>
                            </div>
                        </a>
                    </div>
                    <div class="carrusel-item">
                        <a href="flyers.html" class="tarjeta">
                            <div class="tarjeta-contenido">
                                <img src="../img/c-flyers.png" alt="Flyers" class="tarjeta-imagen" loading="lazy">
                                <h3>Flyers</h3>
                            </div>
                        </a>
                    </div>
                    <div class="carrusel-item">
                        <a href="ilustraciones.html" class="tarjeta">
                            <div class="tarjeta-contenido">
                                <img src="../img/c-ilustraciones.png" alt="Ilustraciones" class="tarjeta-imagen" loading="lazy">
                                <h3>Ilustraciones</h3>
                            </div>
                        </a>
                    </div>
                    <div class="carrusel-item">
                        <a href="infografia.html" class="tarjeta">
                            <div class="tarjeta-contenido">
                                <img src="../img/c-infografias.png" alt="Infografías" class="tarjeta-imagen" loading="lazy">
                                <h3>Infografías</h3>
                            </div>
                        </a>
                    </div>
                    <div class="carrusel-item">
                        <a href="posters.html" class="tarjeta">
                            <div class="tarjeta-contenido">
                                <img src="../img/c-posters.png" alt="Posters" class="tarjeta-imagen" loading="lazy">
                                <h3>Pósters</h3>
                            </div>
                        </a>
                    </div>
                    <div class="carrusel-item">
                        <a href="logos.html" class="tarjeta">
                            <div class="tarjeta-contenido">
                                <img src="../img/c-logos.png" alt="Logos" class="tarjeta-imagen" loading="lazy">
                                <h3>Logos</h3>
                            </div>
                        </a>
                    </div>
                    <div class="carrusel-item">
                        <a href="modelado.html" class="tarjeta">
                            <div class="tarjeta-contenido">
                                <img src="../img/c-modelados.png" alt="Modelado" class="tarjeta-imagen" loading="lazy">
                                <h3>Modelados</h3>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <div class="controles">
                <button id="btnAnterior" aria-label="Anterior">◀ ANTERIOR</button>
                <button id="btnPausaReanudar" aria-label="Pausar/Reanudar"> PAUSA</button>
                <button id="btnSiguiente" aria-label="Siguiente">SIGUIENTE ▶</button>
            </div>

            <div class="indicadores" id="indicadores"></div>
            <div class="auto-status" id="autoStatus">🟢 Movimiento automático activado</div>
        </div>
    </div>

    <script>
        const pista = document.getElementById('pista');
        const items = document.querySelectorAll('.carrusel-item');
        const btnAnterior = document.getElementById('btnAnterior');
        const btnSiguiente = document.getElementById('btnSiguiente');
        const btnPausaReanudar = document.getElementById('btnPausaReanudar');
        const contenedorIndicadores = document.getElementById('indicadores');
        const autoStatus = document.getElementById('autoStatus');
        
        let index = 0;
        let autoInterval;
        let isAutoPlaying = true;
        let itemsPorVista = 4;
        let touchStartX = 0;
        let touchEndX = 0;
        
        function calcularItemsPorVista() {
            const width = window.innerWidth;
            if (width <= 480) return 1;
            if (width <= 768) return 2;
            if (width <= 1024) return 3;
            return 4;
        }
        
        const totalItems = items.length;
        
        function calcularTotalGrupos() {
            itemsPorVista = calcularItemsPorVista();
            return Math.ceil(totalItems / itemsPorVista);
        }
        
        function crearIndicadores() {
            contenedorIndicadores.innerHTML = '';
            const totalGrupos = calcularTotalGrupos();
            for (let i = 0; i < totalGrupos; i++) {
                const punto = document.createElement('div');
                punto.classList.add('punto');
                if (i === 0) punto.classList.add('activo');
                punto.addEventListener('click', () => {
                    index = i;
                    actualizarCarrusel();
                    resetearAuto();
                });
                contenedorIndicadores.appendChild(punto);
            }
        }
        
        function actualizarCarrusel() {
            itemsPorVista = calcularItemsPorVista();
            const totalGrupos = calcularTotalGrupos();
            const maxIndex = totalGrupos - 1;
            
            if (index > maxIndex) index = maxIndex;
            if (index < 0) index = 0;
            
            const desplazamiento = (index * 100) / (totalItems / itemsPorVista);
            pista.style.transform = `translateX(-${desplazamiento}%)`;
            
            const puntos = document.querySelectorAll('.punto');
            puntos.forEach((punto, i) => {
                if (i === index) {
                    punto.classList.add('activo');
                } else {
                    punto.classList.remove('activo');
                }
            });
        }
        
        function siguiente() {
            const totalGrupos = calcularTotalGrupos();
            index = (index + 1) % totalGrupos;
            actualizarCarrusel();
        }
        
        function anterior() {
            const totalGrupos = calcularTotalGrupos();
            index = (index - 1 + totalGrupos) % totalGrupos;
            actualizarCarrusel();
        }
        
        function iniciarAuto() {
            if (autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(() => {
                if (isAutoPlaying) {
                    siguiente();
                }
            }, 4000);
        }
        
        function pausarAuto() {
            isAutoPlaying = false;
            btnPausaReanudar.innerHTML = '▶️ REANUDAR';
            autoStatus.innerHTML = '🔴 Movimiento automático pausado';
            autoStatus.style.color = '#ff6666';
        }
        
        function reanudarAuto() {
            isAutoPlaying = true;
            btnPausaReanudar.innerHTML = ' PAUSA';
            autoStatus.innerHTML = '🟢 Movimiento automático activado';
            autoStatus.style.color = 'rgba(255,255,255,0.7)';
        }
        
        function toggleAuto() {
            if (isAutoPlaying) {
                pausarAuto();
            } else {
                reanudarAuto();
            }
        }
        
        function resetearAuto() {
            if (isAutoPlaying) {
                iniciarAuto();
            }
        }
        
        function verificarImagenes() {
            const imagenes = document.querySelectorAll('.tarjeta-imagen');
            imagenes.forEach(img => {
                img.addEventListener('error', function() {
                    console.warn(`⚠️ Imagen no encontrada: ${this.src}`);
                    this.classList.add('error');
                    this.src = 'https://via.placeholder.com/80x80?text=No+Image';
                });
            });
        }
        
        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
        }
        
        function handleTouchEnd(e) {
            touchEndX = e.changedTouches[0].clientX;
            const swipeThreshold = 50;
            const diff = touchEndX - touchStartX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    anterior();
                } else {
                    siguiente();
                }
                resetearAuto();
            }
        }
        
        btnSiguiente.addEventListener('click', () => {
            siguiente();
            resetearAuto();
        });
        
        btnAnterior.addEventListener('click', () => {
            anterior();
            resetearAuto();
        });
        
        btnPausaReanudar.addEventListener('click', toggleAuto);
        
        const carrusel = document.querySelector('.carrusel');
        carrusel.addEventListener('touchstart', handleTouchStart, { passive: true });
        carrusel.addEventListener('touchend', handleTouchEnd);
        
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const oldItemsPorVista = itemsPorVista;
                const newItemsPorVista = calcularItemsPorVista();
                
                if (oldItemsPorVista !== newItemsPorVista) {
                    crearIndicadores();
                    actualizarCarrusel();
                } else {
                    actualizarCarrusel();
                }
            }, 250);
        });
        
        function init() {
            crearIndicadores();
            actualizarCarrusel();
            iniciarAuto();
            verificarImagenes();
            
            console.log("%c━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "color: #880250");
            console.log("%c✅ CARRUSEL CON FONDO BAJADO", "color: #880250; font-size: 14px; font-weight: bold");
            console.log("%c━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "color: #880250");
            console.log("🎨 FONDO: Posición bajada al 15% (center 15%)");
            console.log("📱 DISPOSITIVO:", /Mobile|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? "MÓVIL/TABLET" : "ESCRITORIO");
            console.log("📏 PANTALLA:", window.innerWidth + "px");
            console.log("🎯 ITEMS POR VISTA:", calcularItemsPorVista());
            console.log("%c━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━", "color: #880250");
        }
        
        init();
    </script>
</body>
</html>
