<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio - Logos</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

/* ===== FONDO ===== */
body {
    background-image: url("../img/fondo-secciones.png");
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center top;
    background-attachment: scroll;
    background-color: #000;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow-x: hidden;
}

/* ===== CONTENEDOR ===== */
.contenedor-libre {
    position: relative;
    width: 100%;
    min-height: 100vh;
}

/* ===== BARRA DE BOTONES (ACOMODADA) ===== */
.barra-botones {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    padding: 10px 15px;
    border-radius: 50px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

/* BOTONES */
.boton-movible {
    padding: 12px 22px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    cursor: grab;
    transition: .3s;
    white-space: nowrap;
}

.boton-movible:active {
    cursor: grabbing;
}

/* COLORES */
.btn-inicio { background:#4CAF50; color:white; }
.btn-regreso { background:#ff9800; color:white; }
.btn-siguiente { background:#2196F3; color:white; }

/* HOVER */
.boton-movible:hover {
    transform: scale(1.08);
}

/* ===== GALERÍA ===== */
.galeria-logos {
    position: fixed;
    top: 50%;
    left: 62%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    display: flex;
    gap: 60px;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    padding: 50px 80px;
    border-radius: 30px;
    border: 1px solid rgba(184, 33, 28, 0.3);
}

.logo-item {
    text-align: center;
    transition: .3s;
}

.logo-item:hover {
    transform: translateY(-8px);
}

.logo-item img {
    width: 400px;
    max-width: 35vw;
    border-radius: 20px;
    cursor: pointer;
    transition: .2s;
}

.logo-item img:hover {
    transform: scale(1.05);
}

.logo-item p {
    color: white;
    margin-top: 20px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 650px) {
    .galeria-logos {
        flex-direction: column;
        left: 50%;
        gap: 40px;
        padding: 40px;
    }

    .logo-item img {
        width: 280px;
    }

    .barra-botones {
        flex-direction: row;
        gap: 10px;
        padding: 8px 10px;
    }

    .boton-movible {
        font-size: 14px;
        padding: 10px 16px;
    }
}
</style>
</head>

<body>

<div class="contenedor-libre">

    <!-- ===== BOTONES ===== -->
    <div class="barra-botones">

        <a href="../index.html"
           class="boton-movible btn-inicio"
           id="btnInicio">
            🏠 Inicio
        </a>

        <button class="boton-movible btn-regreso" id="btnRegreso">
            ◀ Regreso
        </button>

        <button class="boton-movible btn-siguiente" id="btnSiguiente">
            Siguiente ▶
        </button>

    </div>

</div>

<!-- ===== GALERÍA ===== -->
<div class="galeria-logos">

    <div class="logo-item">
        <img src="../img/Logo-queseria.png" alt="Logo Quesería">
        <p>QUESERÍA</p>
    </div>

    <div class="logo-item">
        <img src="../img/Logo-reposteria.png" alt="Logo Repostería">
        <p>REPOSTERÍA</p>
    </div>

</div>

<script>
let botonSeleccionado = null;

/* ===== DRAG / ROTATE ===== */
function makeFullyDraggableAndRotatable(elemento) {

    let startX = 0, startY = 0;
    let startLeft = 0, startTop = 0;
    let startRotate = 0;
    let isDragging = false;
    let isRotating = false;

    const id = elemento.id;

    const savedLeft = localStorage.getItem(`${id}_left`);
    const savedTop = localStorage.getItem(`${id}_top`);
    const savedRotate = localStorage.getItem(`${id}_rotate`);
    const savedScale = localStorage.getItem(`${id}_scale`);

    if (savedLeft && savedTop) {
        elemento.style.left = savedLeft + 'px';
        elemento.style.top = savedTop + 'px';
    }

    if (savedRotate) {
        elemento.style.transform = `rotate(${savedRotate}deg) scale(${savedScale || 1})`;
    }

    function getCurrentRotation() {
        const match = elemento.style.transform.match(/rotate\(([-\d.]+)deg\)/);
        return match ? parseFloat(match[1]) : 0;
    }

    function getCurrentScale() {
        const match = elemento.style.transform.match(/scale\(([\d.]+)\)/);
        return match ? parseFloat(match[1]) : 1;
    }

    elemento.addEventListener('mousedown', (e) => {

        const usarRotacion = e.ctrlKey;

        startX = e.clientX;
        startY = e.clientY;

        if (usarRotacion) {
            isRotating = true;
            startRotate = getCurrentRotation();
        } else {
            isDragging = true;
            startLeft = elemento.offsetLeft;
            startTop = elemento.offsetTop;
        }

        e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {

        if (isDragging) {
            elemento.style.left = startLeft + (e.clientX - startX) + 'px';
            elemento.style.top = startTop + (e.clientY - startY) + 'px';
        }

        if (isRotating) {
            const rotate = startRotate + (e.clientY - startY) * 0.5;
            elemento.style.transform = `rotate(${rotate}deg)`;
        }
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        isRotating = false;
    });
}

/* ===== BOTONES ===== */
const btnInicio = document.getElementById('btnInicio');
const btnRegreso = document.getElementById('btnRegreso');
const btnSiguiente = document.getElementById('btnSiguiente');

if (btnRegreso) btnRegreso.onclick = () => location.href = 'posters.html';
if (btnSiguiente) btnSiguiente.onclick = () => location.href = 'modelado.html';

</script>

</body>
</html>
