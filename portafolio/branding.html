<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Branding Interactivo</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-image: url("../img/fondo-secciones.png");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center top;
            background-attachment: scroll;
            background-color: #000;
            min-height: 100vh;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Contenedor para elementos */
        .drag-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }

        /* ========== BOTONES FIJOS (YA NO SE MUEVEN) ========== */
        .nav-btn {
            position: fixed;      /* Cambiado de absolute a fixed para que estén fijos */
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;      /* Cambiado de grab a pointer */
            font-family: inherit;
            z-index: 1000;
            white-space: nowrap;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .nav-btn:hover {
            transform: scale(1.05);
        }

        .nav-btn:active {
            transform: scale(0.98);
        }

        .nav-btn:focus {
            outline: 3px solid yellow;
            outline-offset: 3px;
        }

        .btn-inicio {
            background-color: #4CAF50;
            color: white;
            top: 100px;
            left: 100px;
        }

        .btn-regreso {
            background-color: #ff9800;
            color: white;
            top: 100px;
            left: 300px;
        }

        .btn-siguiente {
            background-color: #2196F3;
            color: white;
            top: 100px;
            left: 500px;
        }

        /* ========== IMAGEN FLOTANTE INTERACTIVA (SÍ SE PUEDE MOVER) ========== */
        .interactive-image {
            position: absolute;
            z-index: 9999;
            cursor: grab;
            transition: box-shadow 0.2s ease;
        }

        .interactive-image:active {
            cursor: grabbing;
        }

        .interactive-image.dragging {
            cursor: grabbing;
            opacity: 0.95;
        }

        .interactive-image img {
            width: 500px;
            max-width: 75vw;
            height: auto;
            display: block;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            transition: transform 0.2s ease;
        }

        .interactive-image:hover img {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        /* Panel de instrucciones */
        .instructions {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 12px;
            font-family: monospace;
            z-index: 99999;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .instructions kbd {
            background: #333;
            border-radius: 5px;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: bold;
            margin: 0 4px;
            border: 1px solid #666;
            font-family: monospace;
        }

        .instructions .title {
            color: #ff9800;
            font-weight: bold;
            margin-right: 10px;
        }

        @media (max-width: 768px) {
            .interactive-image img {
                width: 320px;
            }
            .instructions {
                bottom: 10px;
                right: 10px;
                font-size: 9px;
                padding: 8px 12px;
            }
            .instructions kbd {
                padding: 2px 5px;
                font-size: 9px;
            }
            .btn-inicio, .btn-regreso, .btn-siguiente {
                padding: 8px 16px;
                font-size: 12px;
            }
            .btn-inicio { top: 80px; left: 20px; }
            .btn-regreso { top: 80px; left: 120px; }
            .btn-siguiente { top: 80px; left: 220px; }
        }

        @media (max-width: 480px) {
            .instructions {
                display: none;
            }
            .btn-inicio { top: 70px; left: 10px; }
            .btn-regreso { top: 70px; left: 100px; }
            .btn-siguiente { top: 70px; left: 190px; }
        }

        /* Efecto de selección para la imagen */
        .selected {
            outline: 3px solid #ff9800;
            outline-offset: 8px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="drag-container">
        <!-- ========== BOTONES FIJOS (YA NO SE ARRASTRAN) ========== -->
        <a href="../index.html" class="nav-btn btn-inicio" id="btnInicio" tabindex="0">
            🏠 Inicio
        </a>

        <button class="nav-btn btn-regreso" id="btnRegreso" tabindex="0">
            ◀ Regreso
        </button>

        <button class="nav-btn btn-siguiente" id="btnSiguiente" tabindex="0">
            Siguiente ▶
        </button>

        <!-- ========== IMAGEN INTERACTIVA (SÍ SE PUEDE MOVER, ROTAR, REDIMENSIONAR) ========== -->
        <div class="interactive-image" id="brandingImage">
            <img src="../img/branding.png" alt="Branding - Proyectos de diseño">
        </div>
    </div>

    <!-- Panel de instrucciones (solo para la imagen) -->
    <div class="instructions">
        <span class="title">🎨 INTERACTIVO (IMAGEN)</span>
        <kbd>🖱️ Arrastrar</kbd> mover ·
        <kbd>Ctrl</kbd>+<kbd>arrastrar</kbd> rotar ·
        <kbd>🐭 Rueda</kbd> tamaño ·
        <kbd>+</kbd>/<kbd>-</kbd> escalar
    </div>

    <script>
        // ========== CLASE SOLO PARA LA IMAGEN (BOTONES QUEDAN FIJOS) ==========
        class DraggableImage {
            constructor(elemento) {
                this.el = elemento;
                this.id = elemento.id;
                this.isDragging = false;
                this.isRotating = false;
                this.startX = 0;
                this.startY = 0;
                this.startLeft = 0;
                this.startTop = 0;
                this.startRotate = 0;
                
                this.loadSavedPosition();
                this.attachEvents();
            }
            
            loadSavedPosition() {
                const savedLeft = localStorage.getItem(`${this.id}_left`);
                const savedTop = localStorage.getItem(`${this.id}_top`);
                const savedRotate = localStorage.getItem(`${this.id}_rotate`);
                const savedScale = localStorage.getItem(`${this.id}_scale`);
                
                if (savedLeft && savedTop) {
                    this.el.style.left = savedLeft + 'px';
                    this.el.style.top = savedTop + 'px';
                } else {
                    // Posición inicial centrada
                    this.el.style.left = '50%';
                    this.el.style.top = '50%';
                    this.el.style.transform = 'translate(-50%, -50%)';
                }
                
                if (savedRotate && savedRotate != 0) {
                    const scale = savedScale || 1;
                    this.el.style.transform = `rotate(${savedRotate}deg) scale(${scale})`;
                } else if (savedScale && savedScale != 1) {
                    this.el.style.transform = `scale(${savedScale})`;
                }
            }
            
            getCurrentRotation() {
                const transform = this.el.style.transform;
                const match = transform?.match(/rotate\(([-\d.]+)deg\)/);
                return match ? parseFloat(match[1]) : 0;
            }
            
            getCurrentScale() {
                const transform = this.el.style.transform;
                const match = transform?.match(/scale\(([\d.]+)\)/);
                return match ? parseFloat(match[1]) : 1;
            }
            
            setScale(scale) {
                const rotate = this.getCurrentRotation();
                scale = Math.min(3, Math.max(0.3, scale));
                if (rotate !== 0) {
                    this.el.style.transform = `rotate(${rotate}deg) scale(${scale})`;
                } else {
                    this.el.style.transform = `scale(${scale})`;
                }
                localStorage.setItem(`${this.id}_scale`, scale);
            }
            
            setRotate(rotate) {
                const scale = this.getCurrentScale();
                if (scale !== 1) {
                    this.el.style.transform = `rotate(${rotate}deg) scale(${scale})`;
                } else {
                    this.el.style.transform = `rotate(${rotate}deg)`;
                }
                localStorage.setItem(`${this.id}_rotate`, rotate);
            }
            
            attachEvents() {
                // Mousedown: iniciar arrastre o rotación
                this.el.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    
                    const usarRotacion = e.ctrlKey;
                    const rect = this.el.getBoundingClientRect();
                    const parentRect = this.el.parentElement.getBoundingClientRect();
                    
                    this.startX = e.clientX;
                    this.startY = e.clientY;
                    
                    if (usarRotacion) {
                        this.isRotating = true;
                        this.startRotate = this.getCurrentRotation();
                    } else {
                        this.isDragging = true;
                        this.startLeft = rect.left - parentRect.left;
                        this.startTop = rect.top - parentRect.top;
                        this.el.style.left = this.startLeft + 'px';
                        this.el.style.top = this.startTop + 'px';
                        // Remover transform de centrado
                        if (this.el.style.transform && !this.el.style.transform.includes('rotate') && !this.el.style.transform.includes('scale')) {
                            this.el.style.transform = '';
                        }
                        this.el.classList.add('dragging');
                    }
                    
                    this.el.style.cursor = 'grabbing';
                    e.stopPropagation();
                });
                
                // Mousemove: mover o rotar
                window.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        const dx = e.clientX - this.startX;
                        const dy = e.clientY - this.startY;
                        
                        let newLeft = this.startLeft + dx;
                        let newTop = this.startTop + dy;
                        
                        // Limitar dentro de la pantalla
                        const maxX = Math.max(0, window.innerWidth - this.el.offsetWidth);
                        const maxY = Math.max(0, document.body.scrollHeight - this.el.offsetHeight);
                        newLeft = Math.min(Math.max(0, newLeft), maxX);
                        newTop = Math.min(Math.max(0, newTop), maxY);
                        
                        this.el.style.left = newLeft + 'px';
                        this.el.style.top = newTop + 'px';
                        
                    } else if (this.isRotating) {
                        const dy = e.clientY - this.startY;
                        const newRotate = this.startRotate + (dy * 0.5);
                        this.setRotate(newRotate);
                    }
                });
                
                // Mouseup: guardar posición
                window.addEventListener('mouseup', () => {
                    if (this.isDragging) {
                        this.isDragging = false;
                        this.el.style.cursor = 'grab';
                        this.el.classList.remove('dragging');
                        
                        const left = parseFloat(getComputedStyle(this.el).left);
                        const top = parseFloat(getComputedStyle(this.el).top);
                        localStorage.setItem(`${this.id}_left`, left);
                        localStorage.setItem(`${this.id}_top`, top);
                        
                    } else if (this.isRotating) {
                        this.isRotating = false;
                        this.el.style.cursor = 'grab';
                    }
                });
                
                // Rueda del mouse para escalar
                this.el.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    let scale = this.getCurrentScale();
                    if (e.deltaY < 0) {
                        scale *= 1.1;
                    } else {
                        scale *= 0.9;
                    }
                    this.setScale(scale);
                }, { passive: false });
                
                // Teclas para escalar
                this.el.addEventListener('keydown', (e) => {
                    let scale = this.getCurrentScale();
                    if (e.key === '+' || e.key === '=') {
                        e.preventDefault();
                        this.setScale(scale * 1.1);
                    } else if (e.key === '-' || e.key === '_') {
                        e.preventDefault();
                        this.setScale(scale * 0.9);
                    }
                });
                
                // Foco para teclado
                this.el.setAttribute('tabindex', '0');
            }
        }
        
        // ========== INICIALIZAR SOLO LA IMAGEN (BOTONES QUEDAN FIJOS) ==========
        const brandingImage = document.getElementById('brandingImage');
        
        // Solo la imagen es interactiva (arrastrable, rotable, redimensionable)
        if (brandingImage) new DraggableImage(brandingImage);
        
        // ========== FUNCIONES DE NAVEGACIÓN PARA BOTONES FIJOS ==========
        const btnInicio = document.getElementById('btnInicio');
        const btnRegreso = document.getElementById('btnRegreso');
        const btnSiguiente = document.getElementById('btnSiguiente');
        
        // Configurar navegación simple (sin detección de arrastre porque ya no se mueven)
        if (btnRegreso) {
            btnRegreso.addEventListener('click', () => {
                window.location.href = 'portafolio.html#branding';
            });
        }
        
        if (btnSiguiente) {
            btnSiguiente.addEventListener('click', () => {
                window.location.href = 'flyers.html';
            });
        }
        
        if (btnInicio) {
            btnInicio.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = '../index.html';
            });
        }
        
        // Verificar que la imagen existe
        const img = document.querySelector('.interactive-image img');
        if (img) {
            img.addEventListener('error', () => {
                console.warn("⚠️ Imagen no encontrada: ../img/branding.png");
                img.style.outline = "3px solid #ff9800";
                img.style.outlineOffset = "5px";
            });
            img.addEventListener('load', () => {
                console.log("✅ Imagen branding.png cargada correctamente");
            });
        }
        
        console.log("%c🎨 Portafolio Interactivo - Branding", "color: #ff9800; font-size: 14px; font-weight: bold");
        console.log("✅ BOTONES FIJOS (no se mueven)");
        console.log("✅ IMAGEN interactiva: ARRASTRAR | ROTAR (Ctrl+arrastrar) | REDIMENSIONAR (rueda/teclas)");
        console.log("✅ Las posiciones de la imagen se guardan en su navegador");
        console.log("✅ 100% compatible con GitHub Pages");
    </script>
</body>
</html>
