<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio - Ilustraciones</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ===== FONDO ===== */
body{
    background:url("../img/fondo-secciones.png") no-repeat center top;
    background-size:cover;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    overflow-x:hidden;
}

/* ===== BOTONES ===== */
.botones-navegacion{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    padding:10px 20px;
    border-radius:50px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    z-index:1000;
}

.boton-nav{
    padding:10px 18px;
    border:none;
    border-radius:30px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.boton-nav:hover{
    transform:scale(1.08);
}

.btn-regreso{background:#ff9800;color:#fff;}
.btn-inicio{background:#4CAF50;color:#fff;}
.btn-siguiente{background:#2196F3;color:#fff;}

/* ===== CARRUSEL ===== */
.carrusel-principal{
    position:absolute;
    top:58%; /* 👈 aquí lo bajé un poco */
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:800px;
}

.carrusel-container{
    background:rgba(0,0,0,0.7);
    border-radius:20px;
    padding:20px;
    overflow:hidden;
    position:relative;
}

.carrusel-track{
    display:flex;
    transition:transform .5s ease;
}

.carrusel-item{
    min-width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.carrusel-item img{
    max-width:90%;
    max-height:450px;
    border-radius:15px;
    cursor:pointer;
    transition:.3s;
}

.carrusel-item img:hover{
    transform:scale(1.03);
}

/* ===== FLECHAS ===== */
.carrusel-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,0.8);
    color:#FFD700;
    font-size:25px;
    cursor:pointer;
    z-index:10;
}

.carrusel-prev{left:-15px;}
.carrusel-next{right:-15px;}

/* ===== INDICADORES ===== */
.carrusel-indicadores{
    display:flex;
    justify-content:center;
    margin-top:15px;
    gap:10px;
}

.indicador{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#aaa;
    cursor:pointer;
}

.indicador.activo{
    width:25px;
    background:#FFD700;
    border-radius:10px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
    .botones-navegacion{
        gap:10px;
        padding:6px 12px;
    }

    .boton-nav{
        font-size:12px;
        padding:6px 10px;
    }

    .carrusel-principal{
        top:62%;
    }
}
</style>
</head>

<body>

<!-- BOTONES -->
<div class="botones-navegacion">
    <button class="boton-nav btn-regreso" onclick="location.href='flyers.html'">◀</button>
    <button class="boton-nav btn-inicio" onclick="location.href='../index.html'">🏠</button>
    <button class="boton-nav btn-siguiente" onclick="location.href='infografia.html'">▶</button>
</div>

<!-- CARRUSEL -->
<div class="carrusel-principal">

    <div class="carrusel-container">

        <button class="carrusel-btn carrusel-prev" onclick="anterior()">‹</button>

        <div class="carrusel-track">
            <div class="carrusel-item">
                <img src="../img/ilustracion1.png" alt="Ilustración 1">
            </div>
            <div class="carrusel-item">
                <img src="../img/ilustracion2.png" alt="Ilustración 2">
            </div>
            <div class="carrusel-item">
                <img src="../img/ilustracion3.png" alt="Ilustración 3">
            </div>
        </div>

        <button class="carrusel-btn carrusel-next" onclick="siguiente()">›</button>
    </div>

    <!-- INDICADORES -->
    <div class="carrusel-indicadores">
        <div class="indicador activo"></div>
        <div class="indicador"></div>
        <div class="indicador"></div>
    </div>

</div>

<!-- JS BÁSICO (si ya tienes el tuyo, puedes borrar esto) -->
<script>
let index = 0;
const track = document.querySelector('.carrusel-track');
const items = document.querySelectorAll('.carrusel-item');

function actualizar(){
    track.style.transform = `translateX(-${index * 100}%)`;
}

function siguiente(){
    index = (index + 1) % items.length;
    actualizar();
}

function anterior(){
    index = (index - 1 + items.length) % items.length;
    actualizar();
}
</script>

</body>
</html>
